function dealDamage(amount, kind, color, secondary, raw){
  if(!E || E.dead) return;
  amount = Math.round(amount);
  const nowD = Date.now();
  if(!raw && nowD < E.staggeredUntil) amount = Math.round(amount*1.3);   // 硬直:受伤+30%
  if(!raw && nowD < E.breachUntil)    amount = Math.round(amount*1.5);   // 暴走破绽窗:+50%
  {  // 溢出结转帽:穿透阶段刻度的部分,最多啃掉下一阶段 50% 预算(不可一发跳关)
    const thr0 = phaseEndThreshold();
    if(E.hp > thr0 && E.hp - amount < thr0){
      const nextBudget = K.ENEMY_HP[Math.min(R.section, K.ENEMY_HP.length-1)] || 0;
      const overflow = Math.min(amount - (E.hp - thr0), Math.round(nextBudget*0.5));
      E.hp = thr0 - overflow;
    } else E.hp = Math.max(0, E.hp - amount);
  }
  const crit = !secondary && amount>=70;
  const tag = (kind && kind!=='普攻') ? kind+' ' : '';
  floatText(`${tag}${secondary?'':'−'}${amount}`, color, secondary, crit, 'foe');
  if(!secondary && amount>telem.maxHit){
    telem.maxHit=amount; telem.maxHitCombo=P.combo; telem.maxHitOver=P.overloadStacks; telem.maxHitKind=kind;
  }
  popCore();
  E.lastHitKind = kind;
  const thr = phaseEndThreshold();
  // 守门者暴走:本阶段血量窗口过半
  if(!E.phase2 && E.hp>thr && E.hp <= (E.phaseStartHp+thr)/2){
    E.phase2=true; E.chargeNeed*=0.85;
    E.breachUntil = Date.now()+5000;          // 破绽窗:5 秒内敌受伤 +50%——留着重技等这一刻
    E.breatherUntil = E.breachUntil+4000;     // 窗后喘息:敌充能半速 4 秒(挣来的波谷)
    document.getElementById('core').classList.add('rage');
    banner('💥 暴走!破绽 5 秒——现在打!');
    toast(`${E.glyph}「${E.lines.phase2}」`);
    setTimeout(()=>{ if(CUR_SCREEN!=='battle' || !E || E.dead || E.phaseClear || P.hp<=0) return;
      if(DRAFT_OPEN || PANEL_OPEN){ R._pendingHeal=(R._pendingHeal||0)+4; return; }   // 冻结中:顺延到解冻
      P.hp=Math.min(K.PLAYER_HP,P.hp+4); floatText('+4 喘息','#43e08a',true,false,'you'); updateSceneUI(); }, 5600);
  }
  updateSceneUI();
  if(E.hp<=0 && !E.dead){
    E.dead=true; SFX.kill(); flashFx();
    document.getElementById('core').classList.add('shatter');
    for(let i=0;i<6;i++) floatText('✦','#fff',true,false,'foe');
    clearTimeout(qTimer); setTimeout(sectionWin, 800);
  } else if(!E.phaseClear && E.hp <= thr){
    // 阶段击破:守门者倒下,血池不回,下一位接管
    E.phaseClear=true; SFX.kill(); flashFx();
    document.getElementById('core').classList.add('shatter');
    for(let i=0;i<6;i++) floatText('✦','#fff',true,false,'foe');
    clearTimeout(qTimer); setTimeout(sectionWin, 800);
  }
}

function afterAction(isBreak){
  updateHUD();
  if(CUR_SCREEN!=='battle' || E.dead || E.phaseClear || P.hp<=0) return;
  // 定时发牌:只在结算拍开屏,永不打断进行中的题
  if(R.draftPending!=null && draftGatesOpen()){
    R._draftLock = true;   // 锁 650ms 空窗:开屏前不许放技能/打字
    R.draftTimer = setTimeout(openBattleDraft, isBreak?1150:650);
    return;
  }
  // 心流加速:连击越高,下一题来得越快;断连后停顿更长,让正确答案被看见
  const delay = (isBreak ? 1150 : Math.max(240, 560 - P.combo*25)) + Math.round(Math.random()*140-60);
  setTimeout(nextQuestion, delay);
}
function checkDraftClock(){   // 到点只挂 pending(arm),开屏永远在结算拍
  if(!R || R.draftIdx>=R.draftAt.length || R.draftPending!=null || DRAFT_OPEN) return;
  if(RUNS===1 && R.draftIdx===1 && !R._bubbled && R.draftAt[1]-R.fightMs<3000){ R._bubbled=true; toast('⛽ 补给要到了'); }
  const timeUp = R.fightMs >= R.draftAt[R.draftIdx];
  const earlyD1 = R.draftIdx===1 && RUNS>=2 && telem.correct>=6;   // 30s 抽双条件:30s 或第 6 次答对(首局只认 30s,纯教学窗)
  if(timeUp || earlyD1){
    R.draftPending = R.draftIdx;
    R._draftPendingSince = R.fightMs;
  }
}
function draftGatesOpen(){   // 充能门+破绽门;饿死保险 8 秒后豁免这两门
  if(!E) return true;
  if(R.fightMs - R._draftPendingSince > 8000) return true;
  const now = Date.now();
  const stunned = now<E.stunnedUntil || now<E.frozenUntil;
  const chargeOk = stunned || E.charge < E.chargeNeed*1000*0.7;   // 出手在即:让这刀先落地
  const breachOk = now >= E.breachUntil;                          // 破绽窗内不打断输出
  return chargeOk && breachOk;
}
function markEvent(){ telem.eventQGaps.push(telem.globalQ - telem.lastEventQ); telem.lastEventQ = telem.globalQ; }

/* ============================== 节末/局末 ============================== */
function sectionWin(){
  stopLoop(); stopAmbient();
  clearTimeout(R.draftTimer); R.draftTimer=null; R._draftLock=false; R.draftPending=null;
  const HEAVY_KINDS=['擂鼓','雪崩','掐表','回血','成王败寇','封山','偷秒','回本','连擂'];
  const heavyKill = E.lastHitKind && HEAVY_KINDS.some(k=>String(E.lastHitKind).startsWith(k));
  P.overloadStacks = 0;   // 节末白攒(SPEC §9 风险端)
  if(heavyKill && R.section < K.SECTIONS){
    P.overloadStacks = 1;   // 斩杀余威:重技终结→带 1 层进下一关(唯一穿透)
    toast('⚔ 斩杀余威:带 1 层过载进下一关');
  }
  if(R.qInSection <= K.ENRAGE_AFTER && R.section < K.SECTIONS){
    P.energy = Math.min(K.ENERGY_MAX, P.energy+20);   // 狂暴前破关:+20⚡
  }
  // 快玩家时钟保底:过关瞬间把战斗时钟抬到楼层,欠的牌关末补发
  if(R.section < K.SECTIONS) R.fightMs = Math.max(R.fightMs, (K.DRAFT_FLOOR||[40000,130000])[R.section-1]||0);
  // 天命翻牌(德州公共牌):过关翻一张
  // 池收窄:技能卡出天命池 = 修复 ownedSkill 静默顶掉亲选技能的 bug,不可回退;升级/成长卡也不走天命(h13 豁免,保住羁绊听牌)
  R.destinyDrawn = [];
  if(R.section < K.SECTIONS){
    for(let i=0;i<1;i++){
        const pool = HEXES.filter(h=>!has(h.id) && !gambleLocked(h) && h.cat!=='技能' && h.cat!=='升级' && (!h.grow || h.id==='h13'));
      if(!pool.length) break;
      const bondsBefore = activeBonds().map(b=>b.id);
      const resBefore = activeResonances().length;
      const dh = pool[rnd(0,pool.length-1)];
      P.destinyIds.push(dh.id);
      P.hexes.push(dh);
      R.destinyDrawn.push({
        hex: dh,
        newBond: activeBonds().find(b=>!bondsBefore.includes(b.id)) || null,
        newRes: activeResonances().length > resBefore ? RESONANCE[dh.school] : null,
      });
    }
  }
  const heal = R.section < K.SECTIONS ? K.HEAL_PER_SECTION : 0;
  const hpBefore = P.hp;
  P.hp = Math.min(K.PLAYER_HP, P.hp + heal);
  R.results.push({ section:R.section, q:R.qInSection, hpLeft:hpBefore, passed:true });
  document.getElementById('secresTag').textContent = `第 ${SEC_CN[R.section-1]||R.section} 关 · ${E.name}`;
  const row=document.getElementById('secresRow'); row.innerHTML='';
  row.appendChild(seg(`${R.qInSection} 题`, '击破用时', 'win'));
  row.appendChild(seg(Math.round(E.hp/E.total*100)+'%', '塔脉剩余', E.hp<=0?'win':''));
  row.appendChild(seg(hpBefore, '剩余 HP', hpBefore<=30?'lose':''));
  if(heal) row.appendChild(seg('+'+(P.hp-hpBefore), '节间回复', 'win'));
  document.getElementById('secresMsg').innerHTML = `<span style="color:var(--silver);font-style:italic">${E.glyph}「${E.lines.defeat}」</span><br>` + (R.section < K.SECTIONS
    ? '下一名守门者更凶:攻击更疼、充能更快。选好你的海克斯。'
    : '塔顶到了——去看战报。');
  document.getElementById('secresBtn').textContent = R.section >= K.SECTIONS ? '查看战报' : '下 一 关';
  // 天命翻牌演出(单张或盲注双张,交错翻面)
  const dbox=document.getElementById('destinyBox');
  const drow=document.getElementById('dRow');
  if(R.destinyDrawn && R.destinyDrawn.length){
    dbox.classList.remove('hidden');
    drow.innerHTML='';
    R.destinyDrawn.forEach((d,i)=>{
      const c=document.createElement('div'); c.className='dcard';
      c.innerHTML=`<div class="dback">🂠</div><div class="dface"><div class="dico">${d.hex.ico}</div><div class="dname">${d.hex.name}</div><div class="ddesc">${d.hex.desc}</div></div>`;
      drow.appendChild(c);
      setTimeout(()=>{
        if(CUR_SCREEN!=='secres') return;
        c.classList.add('flip');
        const note=document.getElementById('dNote');
        if(d.newBond){ SFX.res(); note.textContent = `⛓ 羁绊结成 · ${d.newBond.ico}${d.newBond.name}!`; }
        else if(d.newRes){ SFX.res(); note.textContent = `🔗 共鸣觉醒 · ${d.newRes.name}!`; }
        else { SFX.tierUp(); if(i===0) note.textContent = `🂠 天命 · 第 ${P.destinyIds.length} 翻`; }
      }, 750 + i*700);
    });
    document.getElementById('dNote').textContent = '🂠 天命…';
  } else dbox.classList.add('hidden');
  R._secDraft = null;
  document.getElementById('secDraft').classList.add('hidden');
  document.getElementById('secresBtn').style.display='';
  if(R.section < K.SECTIONS){
    let owed = 0;
    while(R.draftIdx+owed < R.draftAt.length && R.fightMs >= R.draftAt[R.draftIdx+owed]) owed++;
    if(owed > 0){
      R._secDraft = R.draftIdx;
      for(let i=1;i<owed;i++) R.draftAt[R.draftIdx+i] = R.fightMs + 20000*i;   // 其余欠牌下关战斗内补,绝不背靠背开屏
      renderSecDraft(R._secDraft);
    }
  }
  show('secres');
}
function runLose(){
  if(P._dying) return;
  P._dying = true;
  stopLoop(); stopAmbient();
  clearTimeout(R.draftTimer); R.draftTimer=null; R._draftLock=false; R.draftPending=null;
  clearTimeout(qTimer);
  document.getElementById('qInput').disabled = true;
  P.streak=0; renderStreak();
  // 死亡定格(1.25s):这是重大状态切换,不是跳转
  document.getElementById('scene').classList.add('dead');
  banner(`${E?E.glyph:''}「${(E&&E.lines&&E.lines.kill)||'……'}」`);
  beep({f:50, f2:28, dur:.55, type:'sine', gain:.26});
  R.results.push({ section:R.section, q:R.qInSection, hpLeft:0, passed:false, dmgDone:E?E.total-E.hp:0, foeMax:E?E.total:1 });
  setTimeout(()=>finishRun(true), 1250);
}
function nextSection(){ if(R._secDraft!=null) return; if(R.section >= K.SECTIONS || (E && E.hp<=0)) finishRun(false); else { R.section++; beginSection(); } }
function seg(v,k,cls){ const d=document.createElement('div'); d.className='resseg '+(cls||''); d.innerHTML=`<div class="big">${v}</div><div class="lab">${k}</div>`; return d; }

function calcScore(){
  const won = R.results.filter(r=>r.passed).length;
  let s = won*1000 + P.hp*10 + telem.maxCombo*30 + telem.maxHit*2;
  if(won===K.SECTIONS && R.draftIdx<=4) s += 300;   // 轻装通关:抽得少赢得下,给分
  const last = R.results[R.results.length-1];
  if(last && !last.passed && last.foeMax) s += Math.round(last.dmgDone/last.foeMax*600); // 阵亡节的进度分
  return s;
}
function gradeOf(score){ return score>=4400?'S' : score>=3300?'A' : score>=2000?'B' : score>=900?'C' : 'D'; }

function finishRun(defeat){
  stopLoop();
  clearTimeout(R.draftTimer); R.draftTimer=null; R._draftLock=false;
  // 觉醒空手局:pity 累进,承诺看得见
  if(R._upRolled && !R._upSeen) setPity(PITY+1);
  if(defeat) SFX.lose(); else SFX.win();
  const won = R.results.filter(r=>r.passed).length;
  document.getElementById('finalTitle').textContent = defeat
    ? `💀 陨落于第 ${SEC_CN[R.section-1]||R.section} 关 · ${E?E.name:''}`
    : (won===K.SECTIONS ? '🏆 心智之塔 · 登顶' : `战报 · ${won}/${K.SECTIONS}`);
  // 死因链(归因给可修正的自己)+ 近失差距(≤30% 才拍脸)
  const dl=document.getElementById('deathLine');
  if(defeat && E){
    const recent = telem.lastEvents.filter(e=>telem.globalQ - e.q <= 5).map(e=>e.txt);
    const cause = recent.length ? recent.join(' → ')
      : `没有失误,但答题偏慢——守门者出手 ${telem.atkCount} 次,把你磨死了`;
    const pct = Math.round(E.hp/E.total*100);
    dl.innerHTML = `死因:${cause}` + (pct<=30 ? `<br><span class="near">塔脉只剩 ${pct}% ——差一口气</span>` : '');
    dl.classList.remove('hidden');
  } else dl.classList.add('hidden');

  // 轻装通关徽章 / 觉醒空手安慰
  {
    const fn=document.getElementById('finalNotes');
    const notes=[];
    if(!defeat && won===K.SECTIONS && R.draftIdx<=4) notes.push('🪶 轻装通关 · 少拿一手也赢了(+300 分)');
    if(R._upRolled && !R._upSeen){
      const el=eligibleUpgrades()[0];
      const bn = el ? (HEXES.find(x=>x.id===el.upgradeFor)||{name:el.upgradeFor==='small'?'一闪':'擂鼓'}).name : '技能';
      notes.push(`↗ 你的「${bn}」还在等一个时机。(下局觉醒更近了)`);
    }
    if(notes.length){ fn.innerHTML=notes.join('<br>'); fn.classList.remove('hidden'); }
    else fn.classList.add('hidden');
  }
  // 得分 + 评级 + 纪录
  const score = calcScore();
  const g = gradeOf(score);
  const gb=document.getElementById('gradeBox');
  gb.innerHTML = `${g}<span class="gradeflavor">${GRADE_FLAVOR[g]}</span>`;
  gb.className='grade '+g;
  rollNum(document.getElementById('scoreNum'), score, 900, v=>Math.round(v).toLocaleString());
  setTimeout(()=>{ if(CUR_SCREEN!=='final') return; gb.classList.add('stamp'); SFX.kill(); }, 950);
  let best=0; try{ best=Number(localStorage.getItem('ba_best')||0); }catch(e){}
  const bt=document.getElementById('bestTag');
  if(score>best){ bt.textContent='🏅 新纪录!'; bt.className='besttag'; try{ localStorage.setItem('ba_best', String(score)); }catch(e){} }
  else { bt.textContent=`最高 ${best.toLocaleString()}`; bt.className='besttag old'; }

  // 各节战果
  const row=document.getElementById('finalRow'); row.innerHTML='';
  R.results.forEach(r=>{
    const v = r.passed ? `${r.q} 题` : (r.foeMax ? `${Math.round(r.dmgDone/r.foeMax*100)}%` : '💀');
    row.appendChild(seg(v, `第${SEC_CN[r.section-1]||r.section}关 ${r.passed?'击破':'陨落时进度'}`, r.passed?'win':'lose'));
  });
  // 高光数据
  const st=document.getElementById('statsRow'); st.innerHTML='';
  st.appendChild(seg(telem.maxHit, `最大一发 · ${telem.maxHitKind||'—'}`, 'win'));
  st.appendChild(seg(telem.maxCombo, '最高连击', ''));
  st.appendChild(seg(telem.globalQ ? Math.round(telem.correct/telem.globalQ*100)+'%' : '—', '正确率', ''));
  st.appendChild(seg(Math.round((Date.now()-telem.startTime)/1000)+'s', '用时', ''));

  const hx=document.getElementById('finalHexes'); hx.innerHTML='';
  P.hexes.forEach(h=>{ const s=document.createElement('span'); s.className='hexpill'; s.textContent=`${(P.destinyIds||[]).includes(h.id)?'🂠 ':''}${h.ico} ${h.name}`; hx.appendChild(s); });
  activeBonds().forEach(b=>{ const s=document.createElement('span'); s.className='hexpill bondgot'; s.textContent=`⛓ ${b.ico}${b.name}`; hx.appendChild(s); });
  // 遗憾感:差一张没凑齐的羁绊,拍在脸上
  const mb=document.getElementById('missedBonds');
  const missed = missedBonds();
  mb.innerHTML = missed.length
    ? '差一张就凑齐:' + missed.map(b=>{
        const lack = b.pieces.filter(p=>!has(p)).map(p=>{ const h=HEXES.find(x=>x.id===p); return `${h.ico}${h.name}`; }).join('、');
        return `<span class="mb">⛓ ${b.name}<i>(缺 ${lack})</i></span>`;
      }).join('')
    : '';
  document.getElementById('telem').classList.add('hidden');
  renderTelem();
  show('final');
}

function renderTelem(){
  const gaps = telem.eventQGaps.length ? telem.eventQGaps : [telem.globalQ];
  const med = median(gaps);
  const dur = Math.round((Date.now()-telem.startTime)/1000);
  const pass1 = med<=3;
  const usedOver = telem.overloadUses>0;
  const releaseHealthy = telem.releases.small>0 && telem.releases.big>0;
  document.getElementById('telem').innerHTML = `<h3>§13 验证埋点</h3>
    <div class="ti"><span>① 无空白 · 决策/质变间题数中位数</span><b class="${pass1?'pass':'fail'}">${med.toFixed(1)} ${pass1?'✓ ≤3':'✗ >3'}</b></div>
    <div class="ti"><span>② 释放分布(小 / 大 / 过载用过 / 过载崩塌)</span><b>${telem.releases.small} / ${telem.releases.big} / ${usedOver?'是':'否'} / ${telem.odCrash}</b></div>
    <div class="ti"><span>③ 断连次数 · 断后恢复</span><b>${telem.breaks} 次 · 恢复 ${telem.recoveredAfterBreak}</b></div>
    <div class="ti"><span>④ 总承伤 · 结局 HP</span><b>${telem.dmgTaken} · ${P.hp}</b></div>

let PANEL_OPEN=false, PAUSE=null, DRAFT_OPEN=false, DRAFT_PAUSE=null;
function offsetClocks(dt){   // 冻结续走:所有墙钟字段统一在此偏移(新增字段必须登记)
  if(E){ E.stunnedUntil+=dt; E.slowedUntil+=dt; E.frozenUntil+=dt; E.staggeredUntil+=dt; E.breachUntil+=dt; E.breatherUntil+=dt; E.graceUntil+=dt; E.lastTick=Date.now(); }
  if(P && P.hotIronUntil) P.hotIronUntil+=dt;
}
function openBattleDraft(){

  if(PANEL_OPEN) closeBuildPanel();
  DRAFT_OPEN=true; DRAFT_PAUSE={at:Date.now()};

  try{ if(document.activeElement && document.activeElement.blur) document.activeElement.blur(); }catch(e){}

  DRAFT_OPEN=false;
  document.getElementById('bDraft').classList.add('hidden');

function closeBuildPanel(){
  if(!PANEL_OPEN) return;
  PANEL_OPEN=false;
  document.getElementById('bPanel').classList.add('hidden');
  if(PAUSE){
    const dt = Date.now()-PAUSE.at;

    if(PAUSE.qRemain!=null && CUR_SCREEN==='battle' && E && !E.dead && !E.phaseClear){
      q._remain = PAUSE.qRemain;   // 持久化:反复开关不重置保底
      qTimer = setTimeout(()=>onTimeout(), PAUSE.qRemain);
      const fill=document.getElementById('qTimerFill');   // 续走计时条
      const frac = PAUSE.qRemain/(q.benchmark*K.TIMEOUT_FACTOR*1000);
      fill.style.transition='none'; fill.style.width=(frac*100)+'%';

      fill.style.transition=`width ${PAUSE.qRemain/1000}s linear`; fill.style.width='0%';

    if(CUR_SCREEN==='battle' && !BATTLE_TIMER && !DRAFT_OPEN) BATTLE_TIMER = setInterval(combatTick, 100);
    PAUSE=null;
    refocus();
  }
}

  hexFire(b.pieces[0]); hexFire(b.pieces[1]);
  const raw = immediateDamageRaw();
  if(b.id==='b1'){ dealDamage(raw, '山鸣谷应', '#b561ff'); if(E && !E.dead) E.stunnedUntil = Math.max(E.stunnedUntil, Date.now()+2000); }
  if(b.id==='b2'){ dealDamage(Math.round(raw*1.5), '死灰复燃', '#ff9d4d'); P.dotQueue.push({left:2, amount:Math.round(raw*0.5)}); }
  if(b.id==='b3'){ P.energy = Math.min(K.ENERGY_MAX, P.energy+40); floatText('🌊 +40⚡', '#3fe7ff', true, false, 'you'); }
  if(b.id==='b4'){ if(P.overloadStacks<overloadMax()){ P.overloadStacks++; telem.overloadUses++; SFX.odUp(P.overloadStacks); floatText('🎋 过载+1', '#b561ff', true, false, 'you'); } }
  if(b.id==='b5'){ for(let i=0;i<3;i++) dealDamage(Math.round(raw*0.6), '如花似雪', '#3fe7ff', true); }
}

/* ============================== 工具 / 屏幕 ============================== */
function clamp(x,a,b){ return Math.max(a,Math.min(b,x)); }
function rollNum(el, to, dur, fmt){
  fmt = fmt || (v=>String(Math.round(v)));
  if(typeof requestAnimationFrame==='undefined'){ el.textContent=fmt(to); return; }
  const from = parseFloat(String(el.textContent).replace(/[^\d.-]/g,''))||0;
  if(Math.abs(to-from)<1){ el.textContent=fmt(to); return; }
  const t0=performance.now();
  (function step(t){
    const k=Math.min(1,(t-t0)/(dur||400));
    el.textContent=fmt(from+(to-from)*(1-Math.pow(1-k,3)));
    if(k<1) requestAnimationFrame(step);
  })(t0);
}
function median(arr){ const a=arr.slice().sort((x,y)=>x-y); const n=a.length; return n? (n%2? a[(n-1)/2] : (a[n/2-1]+a[n/2])/2) : 0; }
const SCREENS=['start','battle','secres','final'];
function show(id){ SCREENS.forEach(s=>document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); CUR_SCREEN=id; if(id!=='battle') document.getElementById('app').classList.remove('lowhp'); if(PANEL_OPEN) closeBuildPanel(); if(DRAFT_OPEN && id!=='battle'){ DRAFT_OPEN=false; DRAFT_PAUSE=null; document.getElementById('bDraft').classList.add('hidden'); R._draftLock=false; } }

/* 调参表 UI */
const TUNE_SCALARS = ['SECTIONS','BASE_IMMEDIATE','SPLASH_RATIO','ENERGY_BASE','ENERGY_PER_COMBO','ENERGY_MAX','SPEED_CAP','DECAY_WINDOW','SMALL_RELEASE_COST','BIG_RELEASE_COST','SMALL_MULT','BIG_MULT','OVERLOAD_MAX','OVERLOAD_PER_STACK','TIMEOUT_FACTOR','PLAYER_HP','HEAL_PER_SECTION','STUN_SECONDS','SLOW_SECONDS','SLOW_FACTOR','ENRAGE_AFTER'];
const TUNE_ARRAYS = ['COMBO_TIER_THRESHOLDS','TIER_DAMAGE','ENEMY_HP','ENEMY_ATK','ENEMY_CHARGE'];
function buildTuner(){
  const g=document.getElementById('tunerGrid'); g.innerHTML='';
  TUNE_SCALARS.forEach(k=>{ const row=document.createElement('div'); row.className='trow';
    row.innerHTML=`<label>${k}</label><input data-k="${k}" value="${DEFAULTS[k]}">`; g.appendChild(row); });
  TUNE_ARRAYS.forEach(k=>{ const row=document.createElement('div'); row.className='trow';
    row.innerHTML=`<label>${k}</label><input data-k="${k}" style="width:120px" value="${DEFAULTS[k].join(',')}">`; g.appendChild(row); });
}
function readTuner(){
  K={...DEFAULTS};
  document.querySelectorAll('#tunerGrid input').forEach(inp=>{
    const k=inp.dataset.k; const v=inp.value.trim();
    if(TUNE_ARRAYS.includes(k)){ K[k]=v.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x)); }
    else { const n=parseFloat(v); if(!isNaN(n)) K[k]=n; }
  });
}

  document.body.classList.add('touch');
  const inp=document.getElementById('qInput');
  inp.readOnly = true;
  inp.setAttribute('inputmode','none');
}
document.getElementById('qInput').addEventListener('input', onTyped);
document.getElementById('qInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submitAnswer(); });
document.querySelectorAll('.kp').forEach(b=>b.addEventListener('click', ()=>{
  const inp=document.getElementById('qInput');
  if(CUR_SCREEN!=='battle' || inp.disabled) return;
  if(PANEL_OPEN) return;
  const k=b.dataset.k;
  if(k==='del') inp.value = inp.value.slice(0,-1);
  else if(k==='go'){ submitAnswer(); return; }
  else inp.value += k;
  onTyped();
}));
window.addEventListener('keydown', e=>{
  if(PANEL_OPEN && (e.key==='Escape' || e.key==='Enter')){ closeBuildPanel(); return; }
  // Enter 直通:标题开局 / 结算续关 / 战报重开(桌面 QoL)
  if(e.key==='Enter' && !(e.target && e.target.tagName==='INPUT')){
    if(CUR_SCREEN==='start'){ startRun(); return; }
    if(CUR_SCREEN==='secres'){ nextSection(); return; }
    if(CUR_SCREEN==='final'){ startRun(); return; }
  }
  if(CUR_SCREEN!=='battle') return;
  if(e.target && e.target.id==='qInput'){ return; }
  if(e.key==='1') releaseSmall();
  if(e.key==='2') releaseBig();
});
