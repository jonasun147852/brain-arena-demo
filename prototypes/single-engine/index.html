<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>脑力竞技 BRAIN ARENA · 以答为刃</title>
<style>
  :root{
    --bg0:#04060c; --bg1:#080d18; --panel:#0b1120; --panel2:#101a30; --line:#1d2740; --line2:#2a3a5e;
    --cyan:#3fe7ff; --blue:#4d7cff; --gold:#ffcf4d; --red:#ff5470; --green:#43e08a; --purple:#b561ff;
    --text:#eef4ff; --dim:#7e8db0; --silver:#c3ccde;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:#02040a; color:var(--text); font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; overflow:hidden; user-select:none;
    font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;}
  #app{width:min(1000px,100vw); height:min(680px,100vh); position:relative; overflow:hidden;
    background:
      radial-gradient(700px 380px at 18% -8%, rgba(77,124,255,.16), transparent 60%),
      radial-gradient(680px 420px at 88% 112%, rgba(181,97,255,.16), transparent 60%),
      linear-gradient(180deg,var(--bg1),var(--bg0));
    border:1px solid var(--line); border-radius:18px;
    box-shadow:0 40px 110px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.04);}
  #app::before{content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background-image:linear-gradient(rgba(63,231,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(63,231,255,.035) 1px,transparent 1px);
    background-size:38px 38px; mask:radial-gradient(circle at 50% 40%,#000 30%,transparent 85%);
    animation:griddrift 36s linear infinite;}
  @keyframes griddrift{to{background-position:38px 38px;}}
  .screen{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:14px;
    animation:fade .35s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:none;}}
  .hidden{display:none !important;}
  h1{font-size:38px; font-weight:900; letter-spacing:5px; text-align:center;
    background:linear-gradient(100deg,var(--cyan),#7ea0ff 45%,var(--purple)); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 4px 26px rgba(63,231,255,.35));}
  .sub{color:var(--dim); font-size:13.5px; text-align:center; line-height:1.8; max-width:660px;}
  .sub b{color:var(--silver); font-weight:700;}
  .tag{font-size:11.5px; color:var(--cyan); border:1px solid rgba(63,231,255,.4); padding:4px 13px; border-radius:30px; letter-spacing:1px;
    background:rgba(63,231,255,.06); box-shadow:0 0 18px rgba(63,231,255,.12) inset;}
  button{font-family:inherit; cursor:pointer; border:none; color:var(--text); touch-action:manipulation;}
  .btn{padding:14px 42px; font-size:17px; font-weight:800; letter-spacing:2px; border-radius:13px; color:#04121d;
    background:linear-gradient(100deg,var(--blue),var(--cyan)); transition:transform .1s, box-shadow .25s, filter .2s;
    box-shadow:0 12px 34px rgba(63,231,255,.32), inset 0 1px 0 rgba(255,255,255,.4);}
  .btn:hover{transform:translateY(-2px) scale(1.02);}
  .btn:disabled{opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; filter:grayscale(.7);}
  .btn.ghost{background:transparent; border:1px solid var(--line2); color:var(--silver); box-shadow:none; padding:11px 26px; font-size:14px; letter-spacing:1px;}
  .btn.ghost:hover{border-color:var(--cyan); color:var(--cyan);}
  .tunbtn{font-size:12px; color:var(--dim); background:none; border:1px solid var(--line); padding:7px 16px; border-radius:9px;}
  .tunbtn:hover{color:var(--cyan); border-color:var(--cyan);}

  /* tuner */
  .tuner{display:none; flex-direction:column; gap:8px; background:rgba(8,13,24,.9); border:1px solid var(--line); border-radius:14px; padding:16px 20px; width:min(660px,94%); max-height:290px; overflow:auto;}
  .tuner.open{display:flex;}
  .tuner h3{font-size:12px; color:var(--cyan); letter-spacing:1px;}
  .tgrid{display:grid; grid-template-columns:1fr 1fr; gap:6px 20px;}
  .trow{display:flex; align-items:center; gap:8px; font-size:12px;}
  .trow label{flex:1; color:var(--dim);}
  .trow input{width:88px; background:#0b1322; border:1px solid var(--line2); color:var(--text); border-radius:7px; padding:5px 8px; font-family:inherit; font-size:12px;}
  .trow input:focus{outline:none; border-color:var(--cyan);}

  /* draft cards */
  .cards{display:flex; gap:16px; flex-wrap:wrap; justify-content:center;}
  .card{width:216px; min-height:262px; background:linear-gradient(180deg,var(--panel2),#080e1c); border:1px solid var(--line2); border-radius:17px; padding:16px; cursor:pointer; display:flex; flex-direction:column; gap:8px; position:relative; transition:transform .14s, box-shadow .25s; overflow:hidden;}
  .card::after{content:""; position:absolute; inset:0; background:linear-gradient(120deg,transparent 38%,rgba(255,255,255,.1) 50%,transparent 62%); transform:translateX(-120%); transition:transform .6s;}
  .card:hover::after{transform:translateX(120%);}
  .card:hover{transform:translateY(-8px) scale(1.035);}
  .card.r-silver{border-color:#8893ad; box-shadow:0 12px 30px rgba(0,0,0,.5);}
  .card.r-gold{border-color:var(--gold); box-shadow:0 0 24px rgba(255,207,77,.2);}
  .card.r-prism{border-color:var(--purple); box-shadow:0 0 30px rgba(181,97,255,.32);}
  .card.r-prism .ico{filter:drop-shadow(0 0 12px rgba(181,97,255,.6));}
  .card .ico{font-size:32px;}
  .card .name{font-size:19px; font-weight:800;}
  .card .desc{font-size:12.5px; color:var(--silver); line-height:1.55; flex:1;}
  .card .flavor{font-size:11px; color:#d8c07a; font-style:italic; opacity:.9; line-height:1.4; letter-spacing:.5px;}
  .card .delta{font-size:10.5px; color:var(--cyan); font-feature-settings:"tnum" 1;}
  .card .syn{font-size:10.5px; line-height:1.5; border-top:1px dashed var(--line); padding-top:4px; margin-top:2px;}
  .card .syn.bond{color:#ffb367;}
  .card .syn.res{color:#ffb1e6;}
  .card .syn.dim{color:var(--dim);}
  .card .delta b{color:var(--gold);}
  .qbonus{font-size:11px; font-weight:800; color:var(--gold); border:1px solid rgba(255,207,77,.35); padding:2px 9px; border-radius:14px; background:rgba(255,207,77,.08); font-feature-settings:"tnum" 1;}
  .qbonus.drained{color:var(--dim); border-color:var(--line); background:transparent;}
  .card .row1{display:flex; gap:5px; flex-wrap:wrap;}
  .chiptag{font-size:10px; font-weight:800; padding:2px 8px; border-radius:5px; background:rgba(0,0,0,.35); border:1px solid var(--line2); letter-spacing:.5px;}
  .chiptag.school{color:var(--cyan);} .chiptag.cat{color:var(--gold);} .chiptag.ba{color:var(--purple); border-color:var(--purple);}
  .chiptag.res{color:#ffb1e6; border-color:#ff6ec7; background:rgba(255,110,199,.12); animation:pulse 1.2s infinite;}
  .rarbadge{position:absolute; top:10px; right:10px; font-size:9px; font-weight:800; letter-spacing:2px; padding:2px 9px; border-radius:20px; z-index:2;}
  .rarbadge.silver{color:#c3ccde; border:1px solid #6c7790;} .rarbadge.gold{color:var(--gold); border:1px solid var(--gold);} .rarbadge.prism{color:var(--purple); border:1px solid var(--purple); background:rgba(181,97,255,.1);}
  /* 流派家族:左边框 + 底色水洗,一眼认门 */
  .card{border-left-width:4px;}
  .card.sc-nao{border-left-color:var(--blue);  background:linear-gradient(180deg, rgba(77,124,255,.09), #080e1c 55%);}
  .card.sc-shou{border-left-color:var(--red);  background:linear-gradient(180deg, rgba(255,84,112,.08), #080e1c 55%);}
  .card.sc-xin{border-left-color:var(--green); background:linear-gradient(180deg, rgba(67,224,138,.07), #080e1c 55%);}
  .card.sc-ty{border-left-color:var(--gold); background:linear-gradient(180deg, rgba(255,207,77,.07), #080e1c 55%);}
  .card .bastar{color:var(--gold); text-shadow:0 0 10px rgba(255,207,77,.7);}
  .card .schooltag{font-size:10px; color:var(--dim); letter-spacing:1px;}
  .card:active{transform:scale(.97); transition:transform .08s;}
  .card.blindbet{border-color:var(--gold); border-left-color:var(--gold);
    background:repeating-linear-gradient(45deg,#131c33,#131c33 8px,#0d1426 8px,#0d1426 16px);
    box-shadow:0 0 24px rgba(255,207,77,.18);}
  .card.blindbet .name{color:var(--gold);}

  /* battle */
  #battle{justify-content:flex-start; padding:14px 18px; gap:8px;}
  .topbar{width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:12px; color:var(--dim);}
  .topbar .sec{color:var(--text); font-weight:800; font-size:14px; letter-spacing:1px; display:flex; align-items:center; gap:7px;}
  .topbar .sec::before{content:""; width:8px; height:8px; border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan);}
  .foename{color:var(--silver); font-weight:700; font-size:12.5px;}
  .qpill{font-size:11.5px; color:var(--silver); background:rgba(0,0,0,.3); border:1px solid var(--line); padding:5px 12px; border-radius:20px;}

  /* arena */
  .scene{width:100%; height:118px; position:relative; display:flex; align-items:center; justify-content:space-around; overflow:hidden;
    background:radial-gradient(420px 160px at 72% 55%, color-mix(in srgb, var(--enemy) 18%, transparent), transparent 72%),
               radial-gradient(300px 140px at 22% 55%, rgba(63,231,255,.1), transparent 72%);
    border:1px solid var(--line); border-radius:14px; --enemy:var(--cyan);}
  .fighter{display:flex; flex-direction:column; align-items:center; gap:4px; width:150px;}
  .pavatar{width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px;
    background:radial-gradient(circle at 38% 32%, #8be9ff, #0d2438 72%); box-shadow:0 0 26px rgba(63,231,255,.5), inset 0 0 14px rgba(0,0,0,.4);}
  .pavatar{animation:breathe 2.6s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:scale(1) translateY(0);}50%{transform:scale(1.035) translateY(-2px);}}
  .pavatar.hurt{animation:hurt .32s;}
  @keyframes hurt{0%{filter:brightness(2.2) saturate(0); transform:scale(.9);}100%{filter:none; transform:scale(1);}}
  .core{width:56px; height:56px; border-radius:50%; position:relative; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 38% 32%, color-mix(in srgb, var(--enemy) 80%, #fff 0%), color-mix(in srgb, var(--enemy) 30%, #04060c) 70%);
    box-shadow:0 0 30px color-mix(in srgb, var(--enemy) 60%, transparent), inset 0 0 16px rgba(0,0,0,.5); transition:transform .12s, filter .2s;}
  .core .glyph{font-size:22px; font-weight:900; color:rgba(255,255,255,.92); text-shadow:0 2px 8px rgba(0,0,0,.6);}
  .core .ring{position:absolute; border-radius:50%; border:2px solid color-mix(in srgb, var(--enemy) 70%, transparent);}
  .core .r1{inset:-10px; border-style:dashed; opacity:.6; animation:spin 7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .core{animation:corebob 3.4s ease-in-out infinite;}
  @keyframes corebob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  .fighter.lunge{transform:translateX(-9px); transition:transform .15s;}
  .fighter{transition:transform .3s;}
  .core.hit{animation:corehit .26s;}
  @keyframes corehit{0%{transform:scale(1.22); filter:brightness(2);}100%{transform:scale(1);}}
  .core.stunned{filter:grayscale(.8) brightness(.7);}
  .core.winding{animation:wind .5s infinite;}
  @keyframes wind{0%,100%{box-shadow:0 0 30px color-mix(in srgb, var(--enemy) 60%, transparent);}50%{box-shadow:0 0 44px var(--red);}}
  .vs{font-size:17px; font-weight:900; color:var(--gold); text-shadow:0 0 16px rgba(255,207,77,.5);}
  /* 塔脉血池:贯穿全局的一条血,构筑成长的舞台 */
  .towerwrap{width:100%; display:flex; align-items:center; gap:9px;}
  .towerbar{flex:1; height:13px; background:#0a1020; border:1px solid var(--line); border-radius:8px; overflow:hidden; position:relative;}
  .towerfill{height:100%; width:100%; background:linear-gradient(90deg,#7a2038,var(--red) 40%,var(--gold)); transition:width .35s cubic-bezier(.2,.8,.2,1); box-shadow:0 0 14px rgba(255,84,112,.4);}
  .towerfill.low{background:linear-gradient(90deg,#5a1428,#c22f4a);}
  .towerfill.gold{background:linear-gradient(90deg,#b8860b,var(--gold)); box-shadow:0 0 18px rgba(255,207,77,.7);}
  .towerghost{position:absolute; left:0; top:0; bottom:0; width:100%; background:rgba(255,255,255,.4);
    transition:width .9s ease .3s; z-index:0;}
  .towerfill{position:relative; z-index:1;}
  .tnotch{position:absolute; top:-2px; bottom:-2px; width:2px; background:rgba(255,255,255,.55); box-shadow:0 0 6px rgba(255,255,255,.4);}
  .towernum{font-size:12px; font-weight:800; color:var(--silver); min-width:46px; text-align:right; font-feature-settings:"tnum" 1;}
  .hpbar{width:110px; height:7px; background:#0a1020; border:1px solid var(--line); border-radius:4px; overflow:hidden;}
  .hpfill{height:100%; background:linear-gradient(90deg,#2fae6d,#43e08a); width:100%; transition:width .2s;}
  .hpfill.low{background:linear-gradient(90deg,#c22f4a,var(--red));}
  .chargebar{width:110px; height:5px; background:#0a1020; border:1px solid var(--line); border-radius:4px; overflow:hidden;}
  .chargefill{height:100%; background:linear-gradient(90deg,#7a2038,var(--red)); width:0%;}
  .hpnum{font-size:10px; color:var(--dim); letter-spacing:.5px;}
  .fstatus{min-height:15px; font-size:10px; font-weight:700; display:flex; gap:5px;}
  .fstatus .st{padding:0 6px; border-radius:8px; border:1px solid var(--line2); background:rgba(0,0,0,.35);}
  .st.stun{color:var(--gold);} .st.slow{color:var(--cyan);} .st.enr{color:var(--red);}
  .floattext{position:absolute; font-weight:900; pointer-events:none; animation:floatup .95s cubic-bezier(.2,.7,.3,1) forwards; text-shadow:0 2px 10px rgba(0,0,0,.8); white-space:nowrap; z-index:3;}
  @keyframes floatup{0%{opacity:0; transform:translate(0,6px) scale(.6);}18%{opacity:1; transform:translate(calc(var(--dx,0px)*.3),-8px) scale(1.25);}100%{opacity:0; transform:translate(var(--dx,0px),-58px) scale(1);}}
  .floattext.crit{animation:critpop 1.05s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes critpop{0%{opacity:0; transform:translateY(0) scale(.5) rotate(-6deg);}15%{opacity:1; transform:translateY(-10px) scale(1.7) rotate(2deg);}100%{opacity:0; transform:translateY(-70px) scale(1.3);}}
  .shake{animation:shake .28s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}60%{transform:translateX(8px);}}

  .hud{width:100%; display:flex; gap:10px; padding:0 6px;}
  .stat{flex:1; background:linear-gradient(100deg,var(--panel2),#080e1c); border:1px solid var(--line); border-left-width:3px; border-radius:6px; padding:7px 8px; text-align:center; transform:skewX(-8deg);}
  .stat>*{transform:skewX(8deg);}
  .stat .v{font-size:21px; font-weight:900; line-height:1.1;}
  .stat .v.bump{animation:vbump .3s cubic-bezier(.2,1.8,.3,1);}
  @keyframes vbump{0%{transform:skewX(8deg) scale(1);}40%{transform:skewX(8deg) scale(1.35);}100%{transform:skewX(8deg) scale(1);}}
  .stat .k{font-size:9.5px; color:var(--dim); letter-spacing:1.5px; margin-top:2px;}
  .stat.combo .v{color:var(--cyan);} .stat.energy .v{color:var(--gold);} .stat.over .v{color:var(--purple);} .stat.imm .v{color:var(--green);}
  .stat.combo{border-left-color:var(--cyan);} .stat.imm{border-left-color:var(--green);} .stat.energy{border-left-color:var(--gold);} .stat.over{border-left-color:var(--purple);}
  .energybar{height:6px; background:#0a1020; border-radius:4px; margin-top:5px; overflow:hidden; position:relative;}
  .energyfill{height:100%; background:linear-gradient(90deg,var(--gold),var(--red)); width:0%; transition:width .25s; box-shadow:0 0 10px rgba(255,207,77,.6);}
  .energybar .gmark{position:absolute; top:-1px; bottom:-1px; width:2px; background:rgba(255,255,255,.45);}

  .tierchips{width:100%; display:flex; gap:5px; align-items:center; justify-content:center; min-height:17px; flex-wrap:wrap;}
  .tc{font-size:10px; font-weight:700; padding:1px 8px; border-radius:16px; border:1px solid var(--line); color:var(--dim); background:rgba(0,0,0,.25); letter-spacing:.5px; transition:all .25s;}
  .tc.on{color:#04121d; border-color:transparent; background:linear-gradient(100deg,var(--cyan),var(--blue)); box-shadow:0 0 14px rgba(63,231,255,.4);}
  .tc.dbl{color:var(--gold); border-color:var(--gold); background:rgba(255,207,77,.12); animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(255,207,77,0);}50%{box-shadow:0 0 16px rgba(255,207,77,.6);}}

  .qbox{width:100%; flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:11px;
    background:linear-gradient(180deg,rgba(16,26,48,.7),rgba(8,14,28,.7)); border:1px solid var(--line2); border-radius:14px; padding:12px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);}
  .qmeta{display:flex; gap:8px; align-items:center;}
  .qtype{font-size:11px; font-weight:800; letter-spacing:1.5px; padding:3px 11px; border-radius:18px; color:var(--text); background:rgba(255,255,255,.06); border:1px solid var(--line2);}
  .qdiff{font-size:11px; font-weight:800; letter-spacing:2px;}
  .qdiff.easy{color:var(--green);} .qdiff.medium{color:var(--gold);} .qdiff.hard{color:var(--red);}
  .qprompt{font-weight:900; letter-spacing:2px; text-align:center; line-height:1.1; text-shadow:0 2px 16px rgba(63,231,255,.18);}
  .qprompt.qp-l{font-size:40px;} .qprompt.qp-m{font-size:30px;} .qprompt.qp-s{font-size:23px;}
  .qprompt.qp-mc{font-size:19px; letter-spacing:.5px; line-height:1.45; max-width:94%;}
  .qopts{width:92%; display:grid; grid-template-columns:1fr 1fr; gap:7px;}
  .qopt{padding:9px 10px; border-radius:10px; background:linear-gradient(180deg,var(--panel2),#0a1120); border:1px solid var(--line2);
    font-size:13.5px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:7px; transition:transform .08s, border-color .15s;}
  .qopt:hover{border-color:var(--cyan);}
  .qopt:active{transform:scale(.96);}
  .qopt .qn{min-width:19px; height:19px; border-radius:6px; background:rgba(63,231,255,.12); border:1px solid rgba(63,231,255,.4);
    color:var(--cyan); font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .subjrow{display:flex; gap:7px; flex-wrap:wrap; justify-content:center; max-width:92%;}
  .sj{font-size:12.5px; font-weight:800; padding:5px 15px; border-radius:20px; border:1px solid var(--line2); color:var(--dim);
    background:rgba(0,0,0,.25); cursor:pointer; letter-spacing:1px; transition:all .15s;}
  .sj.on{color:#04121d; border-color:transparent; background:linear-gradient(100deg,var(--cyan),var(--blue)); box-shadow:0 0 12px rgba(63,231,255,.35);}
  .qprompt.good{color:var(--green); text-shadow:0 0 26px rgba(67,224,138,.5);}
  .qprompt.bad{color:var(--red); text-shadow:0 0 26px rgba(255,84,112,.5);}
  .qbox.good{border-color:var(--green); box-shadow:0 0 26px rgba(67,224,138,.22), inset 0 1px 0 rgba(255,255,255,.04);}
  .qbox.bad{border-color:var(--red); box-shadow:0 0 26px rgba(255,84,112,.22), inset 0 1px 0 rgba(255,255,255,.04);}
  .qbox.parry{border-color:#ffb347 !important; box-shadow:0 0 26px rgba(255,179,71,.35), inset 0 1px 0 rgba(255,255,255,.04) !important; animation:pulse .6s infinite;}
  .qtimer{width:72%; height:7px; background:#0a1020; border-radius:5px; overflow:hidden; position:relative; border:1px solid var(--line);}
  .qtimerfill{height:100%; background:linear-gradient(90deg,var(--cyan),var(--blue)); width:100%; transition:width .1s linear;}
  .qtimer .bench{position:absolute; top:-2px; bottom:-2px; width:2px; background:var(--green); box-shadow:0 0 8px var(--green);}
  .qzone{position:absolute; left:0; top:0; bottom:0; width:25%; background:linear-gradient(90deg, rgba(255,84,112,.4), rgba(255,84,112,.12)); z-index:0;}
  .qtimerfill{position:relative; z-index:1;}
  .qinput{font-size:26px; font-weight:800; text-align:center; width:210px; background:#05080f; border:2px solid var(--line2); color:var(--text); border-radius:11px; padding:8px; font-family:inherit; letter-spacing:1px;}
  .qinput:focus{outline:none; border-color:var(--cyan); box-shadow:0 0 0 4px rgba(63,231,255,.12);}
  .qinput{caret-color:var(--cyan); transition:transform .08s;}
  .qinput.pop{transform:scale(1.045);}

  .releases{width:100%; display:flex; gap:9px;}
  .rbtn{flex:1; padding:9px 6px; border-radius:12px; font-size:13.5px; font-weight:800; border:1px solid var(--line2); background:linear-gradient(180deg,var(--panel),#080e1c); display:flex; flex-direction:column; gap:1px; align-items:center; transition:transform .1s, box-shadow .25s; position:relative;}
  .rbtn .cost{font-size:10px; font-weight:700; color:var(--dim);}
  .rbtn .od{font-size:10px;}
  .rbtn .kbd{position:absolute; top:6px; right:8px; font-size:9px; color:var(--dim); border:1px solid var(--line2); border-radius:4px; padding:0 4px;}
  .rbtn.small.ready{border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 18px rgba(63,231,255,.25);} .rbtn.small.ready .od{color:var(--cyan);}
  .rbtn.big.ready{border-color:var(--gold); color:var(--gold); box-shadow:0 0 20px rgba(255,207,77,.3); animation:pulse 1.4s infinite;} .rbtn.big.ready .od{color:var(--gold);}
  .rbtn:not(:disabled):hover{transform:translateY(-2px);}
  .rbtn:disabled{cursor:not-allowed;}
  .rbtn:disabled>*:not(.rfill){opacity:.45;}
  /* 技能充能条:能量攒到多少,一眼可见(皇室战争圣水填充) */
  .rbtn{overflow:hidden;}
  .rbtn>*:not(.rfill){position:relative; z-index:1;}
  .rfill{position:absolute; left:0; top:0; bottom:0; width:0%; z-index:0; transition:width .25s;
    background:linear-gradient(90deg, rgba(63,231,255,.07), rgba(63,231,255,.22)); border-right:1px solid rgba(63,231,255,.35);}
  .rbtn.big .rfill{background:linear-gradient(90deg, rgba(255,207,77,.07), rgba(255,207,77,.22)); border-right-color:rgba(255,207,77,.4);}
  .rbtn.ready .rfill{border-right:none;}

  /* keypad (touch only) */
  .keypad{display:none; width:100%; grid-template-columns:repeat(3,1fr); gap:7px;}
  body.touch .keypad{display:grid;}
  body.touch .kbd{display:none;}
  .kp{padding:11px 0; font-size:20px; font-weight:800; border-radius:10px; background:linear-gradient(180deg,var(--panel2),#0a1120); border:1px solid var(--line2); color:var(--text);}
  .kp:active{background:#1c2c4e; transform:scale(.93); border-color:var(--cyan);}
  .kp.fn{color:var(--cyan); font-size:17px;}
  .rbtn:not(:disabled):active{transform:scale(.96);}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line2); border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* result */
  .resrow{display:flex; gap:14px; margin:6px 0; flex-wrap:wrap; justify-content:center;}
  .resseg{background:linear-gradient(100deg,var(--panel2),#080e1c); border:1px solid var(--line); border-left-width:3px; border-radius:8px; padding:15px 22px; text-align:center; min-width:120px; transform:skewX(-6deg);}
  .resseg>*{transform:skewX(6deg);}
  .resseg .big{font-size:28px; font-weight:900;} .resseg.win .big{color:var(--green);} .resseg.lose .big{color:var(--red);}
  .resseg.win{border-color:rgba(67,224,138,.4);} .resseg.lose{border-color:rgba(255,84,112,.35);}
  .resseg .lab{font-size:11px; color:var(--dim); letter-spacing:1px; margin-top:3px;}
  .telem{background:rgba(8,13,24,.8); border:1px solid var(--line); border-radius:13px; padding:15px 19px; width:min(680px,94%); font-size:12.5px; line-height:1.85; max-height:230px; overflow:auto;}
  .telem h3{font-size:12px; color:var(--cyan); margin-bottom:7px; letter-spacing:1.5px;}
  .telem .ti{display:flex; justify-content:space-between; gap:12px;}
  .telem .ti b{color:var(--text);} .telem .pass{color:var(--green);} .telem .fail{color:var(--red);}
  .telem .dimv{color:var(--dim);}
  .hexlist{display:flex; gap:7px; flex-wrap:wrap; justify-content:center;}
  .hexpill{font-size:11.5px; padding:4px 11px; border-radius:16px; border:1px solid var(--line2); background:rgba(0,0,0,.3);}

  .deathline{font-size:12.5px; color:var(--silver); text-align:center; line-height:1.7; max-width:92%;}
  .deathline .near{color:var(--red); font-weight:900; animation:pulse 1.1s infinite;}

  /* 战报 */
  .gradewrap{display:flex; align-items:center; gap:18px;}
  .grade{width:92px; height:92px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:52px; font-weight:900;
    border:3px solid var(--line2); background:radial-gradient(circle at 38% 30%, rgba(255,255,255,.08), rgba(0,0,0,.35));}
  .grade{opacity:0;}
  .grade.stamp{animation:stamp .55s cubic-bezier(.2,1.5,.4,1) forwards;}
  @keyframes stamp{0%{opacity:0; transform:scale(2.6) rotate(-9deg);}55%{opacity:1; transform:scale(.94) rotate(2deg);}100%{opacity:1; transform:scale(1) rotate(0deg);}}
  .grade.S{color:var(--gold); border-color:var(--gold); box-shadow:0 0 44px rgba(255,207,77,.5); text-shadow:0 0 24px rgba(255,207,77,.8);}
  .grade.A{color:var(--cyan); border-color:var(--cyan); box-shadow:0 0 34px rgba(63,231,255,.4);}
  .grade.B{color:var(--silver); border-color:#8893ad;}
  .grade.C,.grade.D{color:var(--dim); border-color:var(--line2);}
  .scorecol{display:flex; flex-direction:column; gap:4px;}
  .scorenum{font-size:34px; font-weight:900; letter-spacing:1px;}
  .scorelab{font-size:11px; color:var(--dim); letter-spacing:2px;}
  .besttag{font-size:11px; font-weight:800; color:var(--gold); border:1px solid var(--gold); border-radius:14px; padding:2px 10px; align-self:flex-start; animation:pulse 1.2s infinite;}
  .besttag.old{color:var(--dim); border-color:var(--line2); animation:none;}
  .toast{position:absolute; bottom:16px; left:50%; transform:translateX(-50%) translateY(8px); background:rgba(11,17,32,.96); border:1px solid var(--purple); color:var(--text); padding:9px 18px; border-radius:24px; font-size:13px; opacity:0; transition:opacity .3s, transform .3s; pointer-events:none; z-index:9; max-width:90%; text-align:center; box-shadow:0 8px 30px rgba(181,97,255,.3);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* build bar(你的海克斯常驻位) */
  .buildrow{display:flex; gap:4px; margin-top:2px; min-height:22px; justify-content:center;}
  .bslot{width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; background:rgba(0,0,0,.4); border:1px solid var(--line2);}
  .bslot.r-gold{border-color:var(--gold); box-shadow:0 0 8px rgba(255,207,77,.25);}
  .bslot.r-prism{border-color:var(--purple); box-shadow:0 0 8px rgba(181,97,255,.35);}
  .bslot.fire{animation:bfire .55s;}
  @keyframes bfire{0%{transform:scale(1);}30%{transform:scale(1.7); box-shadow:0 0 16px var(--gold);}100%{transform:scale(1);}}
  .reschip{font-size:9px; font-weight:800; padding:1px 7px; border-radius:10px; color:#ffb1e6; border:1px solid #ff6ec7; background:rgba(255,110,199,.14); white-space:nowrap;}
  .reschip.bondchip{color:#ffb367; border-color:#ff9d4d; background:rgba(255,157,77,.14);}
  .chiptag.bond{color:#ffb367; border-color:#ff9d4d; background:rgba(255,157,77,.15); animation:pulse 1s infinite;}
  .chiptag.bondhint{color:var(--dim); border-color:var(--line2); border-style:dashed;}
  .hexpill.bondgot{color:#ffb367; border-color:#ff9d4d;}
  .missedbonds{font-size:12px; color:var(--dim); text-align:center; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; align-items:center;}
  .missedbonds .mb{color:#ffb367; border:1px dashed #ff9d4d; border-radius:14px; padding:3px 11px; opacity:.85;}
  .missedbonds .mb i{color:var(--dim); font-style:normal; font-size:11px;}
  .odpips{display:flex; gap:3px; margin-top:2px; justify-content:center;}
  .odp{width:7px; height:7px; border-radius:50%; background:rgba(0,0,0,.5); border:1px solid #5a3f7a;}
  .odp.on{background:var(--purple); border-color:var(--purple); box-shadow:0 0 7px var(--purple);}
  .curbuild{display:flex; gap:6px; align-items:center; font-size:12px; color:var(--dim); flex-wrap:wrap; justify-content:center;}
  .curbuild .bslot{width:26px; height:26px; font-size:15px;}

  /* moment banner(升档/暴走/装载) */
  .banner{position:absolute; top:40%; left:50%; transform:translate(-50%,-50%) scale(.6); font-size:30px; font-weight:900; letter-spacing:2px; color:var(--gold);
    text-shadow:0 0 26px rgba(255,207,77,.65), 0 2px 12px rgba(0,0,0,.85); opacity:0; pointer-events:none; z-index:8; white-space:nowrap;}
  .banner.show{animation:bannerpop 1.15s ease forwards;}
  @keyframes bannerpop{0%{opacity:0; transform:translate(-50%,-50%) scale(.55);}16%{opacity:1; transform:translate(-50%,-50%) scale(1.18);}30%{transform:translate(-50%,-50%) scale(1);}78%{opacity:1;}100%{opacity:0; transform:translate(-50%,-50%) scale(1.02);}}

  .trialbar{width:100%; text-align:center; font-size:11.5px; font-weight:800; color:var(--gold);
    border:1px dashed rgba(255,207,77,.55); border-radius:16px; padding:3px 10px;
    background:rgba(255,207,77,.07); animation:pulse 1.4s infinite; letter-spacing:.5px;}

  /* 天命翻牌(德州公共牌) */
  .destiny{display:flex; flex-direction:column; align-items:center; gap:7px;}
  .dcard{width:118px; height:150px; position:relative; transform-style:preserve-3d; transition:transform .75s cubic-bezier(.3,1.2,.4,1); perspective:800px;}
  .dcard.flip{transform:rotateY(180deg);}
  .dback,.dface{position:absolute; inset:0; backface-visibility:hidden; border-radius:13px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; border:1px solid var(--line2);}
  .dback{font-size:44px; background:repeating-linear-gradient(45deg,#101a30,#101a30 7px,#0b1120 7px,#0b1120 14px); color:var(--gold); box-shadow:0 0 22px rgba(255,207,77,.15);}
  .dface{transform:rotateY(180deg); background:linear-gradient(180deg,var(--panel2),#080e1c); border-color:var(--gold); box-shadow:0 0 26px rgba(255,207,77,.3); padding:8px;}
  .dface .dico{font-size:32px;} .dface .dname{font-size:15px; font-weight:800;}
  .dface .ddesc{font-size:10px; color:var(--silver); text-align:center; line-height:1.4;}
  .dnote{font-size:12.5px; font-weight:800; color:var(--gold); letter-spacing:1px;}
  .destinyinfo{font-size:11.5px; color:var(--dim); text-align:center; line-height:1.6; max-width:90%;}
  .destinyinfo b{color:var(--gold);}

  /* 构筑详情面板 */
  .bpanel{position:absolute; inset:0; z-index:20;}
  .bscrim{position:absolute; inset:0; background:rgba(2,4,10,.72); backdrop-filter:blur(2px);}
  .bsheet{position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:min(560px,100%); max-height:82%;
    background:linear-gradient(180deg,var(--panel2),#0a101f); border:1px solid var(--line2); border-bottom:none;
    border-radius:18px 18px 0 0; display:flex; flex-direction:column; animation:sheetup .28s cubic-bezier(.2,1.1,.4,1);}
  @keyframes sheetup{from{transform:translateX(-50%) translateY(40px); opacity:0;}to{transform:translateX(-50%) translateY(0); opacity:1;}}
  .bhead{display:flex; align-items:center; gap:10px; padding:13px 16px 9px; font-size:15px; font-weight:900; letter-spacing:2px; border-bottom:1px solid var(--line);}
  .bpause{font-size:10.5px; font-weight:800; color:var(--gold); border:1px solid rgba(255,207,77,.4); border-radius:12px; padding:2px 9px; animation:pulse 1.4s infinite;}
  .bclose{margin-left:auto; background:none; border:1px solid var(--line2); color:var(--silver); border-radius:8px; padding:4px 12px; font-size:13px;}
  .bbody{overflow-y:auto; padding:12px 16px 18px; display:flex; flex-direction:column; gap:9px;}
  .bsec{font-size:11px; color:var(--dim); letter-spacing:2px; margin-top:5px;}
  .bcard{display:flex; gap:10px; align-items:flex-start; background:rgba(0,0,0,.28); border:1px solid var(--line); border-left-width:3px; border-radius:10px; padding:9px 11px;}
  .bcard .bico{font-size:22px; line-height:1.2;}
  .bcard .bmain{flex:1; min-width:0;}
  .bcard .bname{font-size:14px; font-weight:800;}
  .bcard .bmeta{font-size:9.5px; color:var(--dim); letter-spacing:.5px; margin-left:6px;}
  .bcard .bfl{font-size:10.5px; color:#d8c07a; font-style:italic; margin:1px 0;}
  .bcard .bdesc{font-size:12px; color:var(--silver); line-height:1.5;}
  .bcard .bprog{font-size:11px; color:var(--gold); font-weight:800; margin-top:2px;}
  .bcard.miss{opacity:.6; border-style:dashed;}
  .binfo{width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center;
    font-size:12px; color:var(--cyan); border:1px dashed rgba(63,231,255,.5); background:rgba(63,231,255,.07);}
  .buildrow{cursor:pointer;}
  .curbuild{cursor:pointer;}

  /* 斩杀提示 + 暴走 */
  .rbtn.breach{border-color:var(--gold) !important; color:var(--gold) !important; box-shadow:0 0 26px rgba(255,207,77,.55) !important; animation:pulse .5s infinite;}
  .rbtn.kill{border-color:var(--red) !important; color:var(--red) !important; box-shadow:0 0 22px rgba(255,84,112,.45) !important; animation:pulse .7s infinite;}
  .rbtn.kill .od{color:var(--red) !important; font-weight:900;}
  .core.rage{filter:saturate(1.7) brightness(1.2);}
  .scene.dead .core, .scene.dead .pavatar{filter:grayscale(.85) brightness(.55); transition:filter .4s;}
  .scene.dead{background:radial-gradient(420px 160px at 50% 55%, rgba(255,84,112,.1), transparent 72%);}
  .core.rage .r1{animation-duration:2.2s;}

  /* VS 关卡演出(格斗游戏开场仪式) */
  .vsplash{position:absolute; inset:0; z-index:12; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background:radial-gradient(600px 400px at 50% 45%, rgba(10,16,32,.97), rgba(2,4,10,.99)); pointer-events:none; opacity:0;}
  .vsplash.play{animation:vsp 2.0s ease forwards;}
  @keyframes vsp{0%{opacity:0; transform:scale(1.06);}10%{opacity:1; transform:scale(1);}82%{opacity:1;}100%{opacity:0; visibility:hidden;}}
  .vsk{font-size:15px; letter-spacing:8px; color:var(--dim);}
  .vsg{font-size:74px; font-weight:900; line-height:1;
    background:linear-gradient(160deg, #fff, var(--enemy,#3fe7ff)); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 34px var(--enemy,#3fe7ff)); animation:vsgIn .5s cubic-bezier(.2,1.6,.4,1);}
  @keyframes vsgIn{0%{transform:scale(2.6); opacity:0;}100%{transform:scale(1); opacity:1;}}
  .vsn{font-size:24px; font-weight:900; letter-spacing:4px;}
  .vsq{font-size:14px; color:var(--silver); font-style:italic; letter-spacing:1px; max-width:80%; text-align:center;}
  .vsload{font-size:12px; color:var(--gold); border:1px solid rgba(255,207,77,.4); padding:4px 14px; border-radius:20px; margin-top:8px;}
  .vsplash.play{pointer-events:auto; cursor:pointer;}
  .vskip{position:absolute; bottom:18px; font-size:11px; color:var(--dim); letter-spacing:2px; opacity:.7;}
  .bestline{font-size:12.5px; color:var(--gold); letter-spacing:1px; border:1px solid rgba(255,207,77,.3); padding:4px 16px; border-radius:20px; background:rgba(255,207,77,.06);}

  /* 连击喝彩分级(鬼泣式) */
  .qprompt.qin{animation:qin .28s cubic-bezier(.2,1.4,.4,1);}
  @keyframes qin{0%{opacity:0; transform:translateY(12px) scale(.9);}100%{opacity:1; transform:none;}}
  .qbox.g1{border-color:rgba(63,231,255,.4);}
  .qbox.g2{border-color:rgba(255,207,77,.45); box-shadow:0 0 18px rgba(255,207,77,.12), inset 0 1px 0 rgba(255,255,255,.04); animation:qglow 2.4s ease-in-out infinite;}
  .qbox.g3{border-color:rgba(255,84,112,.5); box-shadow:0 0 24px rgba(255,84,112,.16), inset 0 1px 0 rgba(255,255,255,.04); animation:qglow 1.8s ease-in-out infinite;}
  @keyframes qglow{50%{filter:brightness(1.1);}}
  .atkwarn{position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:17px; font-weight:900; color:var(--red);
    text-shadow:0 0 12px var(--red); animation:warnblink .4s infinite; pointer-events:none;}
  @keyframes warnblink{0%,100%{opacity:1;}50%{opacity:.25;}}
  .qprompt.good.co1{color:var(--cyan);}
  .qprompt.good.co2{color:var(--gold); text-shadow:0 0 28px rgba(255,207,77,.6);}
  .qprompt.good.co3{color:#ff9d4d; text-shadow:0 0 30px rgba(255,157,77,.7); animation:coShake .3s;}
  .qprompt.good.co4{background:linear-gradient(100deg,#ffb1e6,var(--purple),#7ea0ff); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 0 22px rgba(181,97,255,.8)); animation:coShake .3s;}
  @keyframes coShake{0%{transform:scale(1.25) rotate(-2deg);}60%{transform:scale(.96) rotate(1deg);}100%{transform:scale(1);}}
  .stat.combo .v.t1{color:var(--cyan);}
  .stat.combo .v.t2{color:var(--gold); text-shadow:0 0 14px rgba(255,207,77,.6);}
  .stat.combo .v.t3{background:linear-gradient(180deg,#ffd34d,#ff5470); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 0 10px rgba(255,84,112,.7));}

  /* 打击物理感:闪白 / 核心碎裂 / 低血暗角 */
  #flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:11; transition:opacity .16s;}
  #flash.on{opacity:.5; transition:none;}
  .core.shatter{animation:shatter .65s forwards;}
  @keyframes shatter{0%{transform:scale(1); filter:brightness(3);}40%{transform:scale(1.5) rotate(8deg); opacity:1;}100%{transform:scale(2.1) rotate(-6deg); opacity:0; filter:brightness(4) blur(4px);}}
  #app.lowhp::after{content:""; position:absolute; inset:0; pointer-events:none; z-index:6; border-radius:18px;
    box-shadow:inset 0 0 90px rgba(255,84,112,.5); animation:lowbeat 1.1s infinite;}
  @keyframes lowbeat{0%,100%{opacity:.45;}50%{opacity:1;}}

  /* 标题演出 */
  .tagline{font-size:14px; letter-spacing:6px; color:var(--gold); text-shadow:0 0 18px rgba(255,207,77,.4);}
  .btn.cta{animation:ctapulse 1.8s infinite;}
  @keyframes ctapulse{0%,100%{box-shadow:0 12px 34px rgba(63,231,255,.32);}50%{box-shadow:0 12px 50px rgba(63,231,255,.6);}}
  .gradeflavor{font-size:11px; letter-spacing:3px; display:block; margin-top:2px;}

  /* ============ mobile ============ */
  @media (max-width:720px){
    body{align-items:stretch;}
    #app{width:100vw; height:100vh; height:100dvh; border-radius:0; border:none;}
    .screen{padding:14px; gap:10px;}
    h1{font-size:26px; letter-spacing:3px;}
    .sub{font-size:12px; line-height:1.65;}
    #start,#draft,#final{justify-content:flex-start; overflow:auto; padding-top:26px;}
    .cards{gap:10px;}
    .card{width:min(340px,90vw); min-height:0; flex-direction:column; padding:13px;}
    .card .ico{font-size:26px;} .card .name{font-size:16px;}
    #battle{padding:8px 10px; gap:7px;}
    .scene{height:104px;}
    .fighter{width:120px;}
    .pavatar,.core{width:46px; height:46px;} .pavatar{font-size:21px;} .core .glyph{font-size:18px;}
    .hpbar,.chargebar{width:92px;}
    .stat{padding:5px 6px;} .stat .v{font-size:16px;} .stat .k{font-size:8.5px; letter-spacing:1px;}
    .tierchips{min-height:18px;} .tc{font-size:10px; padding:1px 8px;}
    .qbox{gap:7px; padding:9px;}
    .qprompt.qp-l{font-size:27px;} .qprompt.qp-m{font-size:21px;} .qprompt.qp-s{font-size:17px;}
    .qinput{width:150px; font-size:21px; padding:5px;}
    .qtimer{width:86%;}
    .rbtn{padding:7px 4px; font-size:12px;}
    .resseg{padding:11px 16px; min-width:100px;} .resseg .big{font-size:22px;}
    .telem{font-size:11.5px; padding:12px 14px;}
    .tgrid{grid-template-columns:1fr;}
    .banner{font-size:21px; letter-spacing:1px;}
    .bslot{width:18px; height:18px; font-size:11px; border-radius:6px;}
    .buildrow{min-height:18px;}
    .grade{width:70px; height:70px; font-size:38px;}
    .scorenum{font-size:26px;}
    .vsg{font-size:54px;} .vsn{font-size:18px;} .vsq{font-size:12px;}
    .tagline{font-size:12px; letter-spacing:4px;}
  }
/* ===== v5 定时发牌 ===== */
.bdraft{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; background:rgba(2,4,10,.84); backdrop-filter:blur(3px); }
.bdraft.hidden{ display:none; }
.bdwrap{ width:min(96vw,920px); max-height:92vh; overflow-y:auto; text-align:center; padding:14px; }

.card.r-id{ border-color:#3d4d70; }

<body>
<div id="app">

  <!-- START -->
  <div id="start" class="screen">
    <span class="tag">BRAIN ARENA</span>
    <h1>脑力竞技</h1>
    <div class="tagline">以 答 为 刃</div>
    <div class="bestline hidden" id="bestLine"></div>
    <div class="sub">三名守门者,共守一条塔脉。<b>答对即出刀——你死,或塔倾。</b></div>
    <div class="subjrow" id="subjRow"></div>
    <button class="btn cta" onclick="startRun()">⚔ 挑 战 开 始</button>
    <button class="tunbtn" onclick="document.getElementById('tuner').classList.toggle('open')">⚙</button>
    <div style="position:fixed; left:10px; bottom:8px; font-size:10px; color:#5a6a8a; letter-spacing:1px;">v5.1.1</div>
    <div id="tuner" class="tuner"><h3>可调常量(改了下一局生效)</h3><div class="tgrid" id="tunerGrid"></div></div>
  </div>


  <!-- BATTLE -->
  <div id="battle" class="screen hidden">
    <div class="topbar">
      <span class="sec" id="bSec">第 1 节</span>
      <span class="foename" id="foeName">磐石 · Σ</span>
      <span style="display:flex; gap:6px; align-items:center;">
        <span class="qpill" id="qCount">第 1 题</span>
        <button class="tunbtn" id="sndBtn" onclick="toggleMute()" style="padding:3px 9px;">🔊</button>
      </span>
    </div>

    <div class="towerwrap">
      <div class="towerbar"><div class="towerghost" id="towerGhost"></div><div class="towerfill" id="towerFill"></div><div class="tnotch" id="tn1"></div><div class="tnotch" id="tn2"></div></div>
      <div class="towernum" id="towerNum">1060</div>
      <div class="draftpips" id="draftPips"></div>
    </div>

    <div class="scene" id="scene">
      <div class="fighter">
        <div class="pavatar" id="pAvatar">🧠</div>
        <div class="hpbar"><div class="hpfill" id="pHpFill"></div></div>
        <div class="hpnum" id="pHpNum">100 / 100</div>
        <div class="buildrow" id="buildRow"></div>
      </div>
      <div class="vs">VS</div>
      <div class="fighter" id="foeF">
        <div class="core" id="core"><div class="ring r1"></div><div class="glyph" id="coreGlyph">Σ</div><div class="atkwarn hidden" id="atkWarn">!</div></div>
        <div class="chargebar"><div class="chargefill" id="chargeFill"></div></div>
        <div class="fstatus" id="foeStatus"></div>
      </div>
    </div>

    <div class="hud">
      <div class="stat combo"><div class="v" id="sCombo">0</div><div class="k">🔥 连 击</div></div>
      <div class="stat imm"><div class="v" id="sImm">10</div><div class="k">⚔ 攻 击</div></div>
      <div class="stat energy"><div class="v" id="sEnergy">0</div><div class="k">⚡ 能 量</div></div>
      <div class="stat over"><div class="v" id="sOver">0</div><div class="k">☢ 过 载</div></div>
    </div>
    <div class="tierchips" id="tierChips">
      <span class="tc on">单体</span>
      <span class="tc" id="tcSplash">溅射</span>
      <span class="tc" id="tcSlow">减速</span>
      <span class="tc" id="tcDouble">双响</span>
      <span class="tc dbl hidden" id="tcDbl">下一题翻倍!</span>
    </div>
    <div class="trialbar hidden" id="trialBar"></div>

    <div class="qbox" id="qbox">
      <div class="qmeta"><span class="qtype" id="qType">速算</span><span class="qdiff" id="qDiff">★</span><span class="qbonus" id="qBonus">⚡+0</span></div>
      <div class="qprompt qp-l" id="qPrompt">3 × 4 + 2</div>
      <div class="qopts hidden" id="qOpts"></div>
      <div class="qtimer"><div class="qzone hidden" id="qZone"></div><div class="qtimerfill" id="qTimerFill"></div><div class="bench" id="qBench"></div></div>
      <input class="qinput" id="qInput" inputmode="numeric" autocomplete="off" placeholder="答案">
    </div>

    <div class="releases">
      <button class="rbtn small" id="rSmall" onclick="releaseSmall()"><div class="rfill" id="rSmallFill"></div><span class="kbd">1</span><span id="rSmallName">一闪</span><span class="cost" id="rSmallCost">50⚡</span><span class="od" id="rSmallOd">攻击 × 3</span><span class="castdots" id="cdSmall"></span></button>

      <div class="vsn" id="vsName">守门者 · 磐石Σ</div>
      <div class="vsq" id="vsQuote"></div>
      <div class="vsload" id="vsLoad"></div>
      <div class="vskip">轻触跳过 ›</div>
    </div>
    <div id="flash"></div>

  <!-- 定时发牌覆盖层(战斗冻结) -->
  <div class="bdraft hidden" id="bDraft">

      <div class="bdhead"><span class="tag" id="bdTag">⛽ 补给 1/4</span><span class="bdsub" id="bdSub"></span></div>

    </div>
  </div>

    <div class="bsheet">
      <div class="bhead"><span>我的构筑</span><span class="bpause" id="bPause">⏸ 时间已停</span><button class="bclose" onclick="closeBuildPanel()">✕</button></div>
      <div class="bbody" id="bBody"></div>
    </div>
  </div>

    <span class="tag" id="secresTag">第 1 节结算</span>

    <div class="destiny hidden" id="destinyBox">

    <button class="btn ghost" style="padding:7px 18px; font-size:12px;" onclick="document.getElementById('telem').classList.toggle('hidden')">开发数据 §13</button>
    <div class="telem hidden" id="telem"></div>
  </div>

</div>

const AU = { ctx:null, muted:false };
try{ AU.muted = localStorage.getItem('ba_mute')==='1'; }catch(e){}
function au(){
  if(!AU.ctx){ try{ AU.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
  return AU.ctx;
}
function beep(o){
  const c=au(); if(!c || AU.muted) return;
  try{
    if(c.state==='suspended') c.resume();
    const t=c.currentTime + (o.delay||0);
    const osc=c.createOscillator(), g=c.createGain();
    osc.type=o.type||'sine';
    osc.frequency.setValueAtTime(o.f||440, t);
    if(o.f2) osc.frequency.exponentialRampToValueAtTime(Math.max(20,o.f2), t+(o.dur||0.12));
    g.gain.setValueAtTime(o.gain||0.13, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+(o.dur||0.12));
    osc.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t+(o.dur||0.12)+0.03);
  }catch(e){}
}

/* 环境音:极低音量双振荡铺底,LFO 让它像在呼吸 */
function startAmbient(){
  const c=au(); if(!c||AU.muted||AU.amb) return;
  try{
    if(c.state==='suspended') c.resume();
    const g=c.createGain(); g.gain.value=0.016;
    const o1=c.createOscillator(); o1.type='sawtooth'; o1.frequency.value=55;
    const o2=c.createOscillator(); o2.type='sawtooth'; o2.frequency.value=55.6;
    const f=c.createBiquadFilter(); f.type='lowpass'; f.frequency.value=200;
    const lfo=c.createOscillator(); lfo.frequency.value=0.12;
    const lg=c.createGain(); lg.gain.value=70;
    lfo.connect(lg); lg.connect(f.frequency);
    o1.connect(f); o2.connect(f); f.connect(g); g.connect(c.destination);
    o1.start(); o2.start(); lfo.start();
    AU.amb={o1,o2,lfo,g};
  }catch(e){}
}
function stopAmbient(){
  if(!AU.amb) return;
  try{ AU.amb.g.gain.linearRampToValueAtTime(0.0001, au().currentTime+0.3);
    const a=AU.amb; setTimeout(()=>{ try{a.o1.stop();a.o2.stop();a.lfo.stop();}catch(e){} }, 400);
  }catch(e){}
  AU.amb=null;
}

/* ============================== 题目系统 (§4) ============================== */
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[rnd(0,arr.length-1)]; }

function genQuestion(section, forceDiff){
  const mix = DIFF_MIX[Math.min(section,DIFF_MIX.length-1)];
  const r = Math.random();
  const diff = forceDiff || (r<mix[0] ? 'easy' : r<mix[0]+mix[1] ? 'medium' : 'hard');
  const subj = pick(activeSubjects());
  if(subj !== 'math'){
    const mc = genBankQuestion(subj, diff);
    if(mc) return mc;   // 该科题量耗尽则回落数学
  }
  return genMath(diff);
}
function genBankQuestion(subj, diff){
  const bank = BANK[subj];
  let cand = bank.map((x,i)=>({x,i})).filter(o=>o.x.d===diff && !R.usedQ.has(subj+o.i));
  if(!cand.length) cand = bank.map((x,i)=>({x,i})).filter(o=>!R.usedQ.has(subj+o.i));
  if(!cand.length) return null;
  const c = pick(cand);
  R.usedQ.add(subj+c.i);
  const order = [0,1,2,3];   // Fisher-Yates 洗牌,防背位置(sort(random) 有偏)
  for(let i=3;i>0;i--){ const j=rnd(0,i); [order[i],order[j]]=[order[j],order[i]]; }
  return {
    prompt: c.x.q,
    opts: order.map(k=>c.x.o[k]),
    answer: order.indexOf(c.x.a)+1,
    mc: true, difficulty: c.x.d, type: subj,
    benchmark: benchmark('mc', c.x.d),
  };
}
function genMath(diff){
  const type = pick(TYPES);
  let prompt, answer;

  if(type==='calc'){
    if(diff==='easy'){ const a=rnd(2,9),b=rnd(2,9),c=rnd(1,9); prompt=`${a} × ${b} + ${c}`; answer=a*b+c; }
    else if(diff==='medium'){ const a=rnd(2,9),b=rnd(11,29),c=rnd(1,20); prompt=`${a} × ${b} + ${c}`; answer=a*b+c; }
    else { const a=rnd(11,29),b=rnd(11,19); prompt=`${a} × ${b}`; answer=a*b; }
  }
  else if(type==='seq'){
    let s;
    if(diff==='easy'){ const st=rnd(1,9), d=rnd(2,6); s=[st,st+d,st+2*d,st+3*d]; answer=st+4*d; }
    else if(diff==='medium'){
      if(Math.random()<0.5){ const st=rnd(2,7), rt=pick([2,3]); s=[st,st*rt,st*rt*rt,st*rt*rt*rt]; answer=s[3]*rt; }
      else { const st=rnd(2,9), d=rnd(8,15); s=[st,st+d,st+2*d,st+3*d]; answer=st+4*d; }
    }
    else {
      const mode=pick(['fib','sq']);
      if(mode==='fib'){ const a=rnd(1,5), b=rnd(2,7); const t2=a+b,t3=b+t2; s=[a,b,t2,t3]; answer=t2+t3; }
      else { const base=rnd(1,4); s=[base*base,(base+1)**2,(base+2)**2,(base+3)**2]; answer=(base+4)**2; }
    }
    prompt = s.join(',  ') + ',  ?';
  }
  else if(type==='eq'){
    if(diff==='easy'){ const x=rnd(2,9), a=rnd(2,6), b=rnd(1,15); prompt=`${a}x + ${b} = ${a*x+b}`; answer=x; }
    else if(diff==='medium'){ const x=rnd(2,12), a=rnd(2,9), b=rnd(1,30); prompt=`${a}x − ${b} = ${a*x-b}`; answer=x; }
    else { let a=rnd(4,9), e=rnd(1,a-2); const x=rnd(2,12), b=rnd(1,20); const d=a*x+b-e*x; prompt=`${a}x + ${b} = ${e}x + ${d}`; answer=x; }
  }
  else {
    if(diff==='easy'){ const p=pick([10,20,25,50]), n=20*rnd(2,10); prompt=`${n} 的 ${p}%`; answer=n*p/100; }
    else if(diff==='medium'){ const p=pick([5,15,30,40,60]), n=20*rnd(2,10); prompt=`${n} 的 ${p}%`; answer=n*p/100; }
    else { const p=pick([10,20,25,50]), n=20*rnd(2,8); prompt=`${n} 增加 ${p}%`; answer=Math.round(n*(100+p)/100); }
  }
  return { prompt, answer, difficulty:diff, type, benchmark:benchmark(type,diff) };
}

function combatTick(){
  if(CUR_SCREEN!=='battle' || PANEL_OPEN || DRAFT_OPEN || !E || E.dead || E.phaseClear || P.hp<=0) return;
  const now = Date.now();
  let dt = now - E.lastTick;
  E.lastTick = now;
  if(dt<=0){ return; }
  R.fightMs += dt;   // 战斗时钟:与敌人充能同源,冻结通路自动正确
  checkDraftClock();
  renderDraftPips();
  // 速度奖池实时蒸发(眼看着奖励流走 → 催促感)
  if(q && !P._betweenQ){
    let base = K.ENERGY_BASE + K.ENERGY_PER_COMBO*P.combo;
    if(has('h07')) base *= 0.6;
    const t=(now-qStart)/1000;
    const sNow = clamp(1 - t/(q.benchmark*K.DECAY_WINDOW), 0, 1) * speedCap() + windBonus();
    const v = Math.round(base*sNow);
    const b=document.getElementById('qBonus');
    b.textContent = '⚡+'+v;
    b.classList.toggle('drained', v<=0);
  }
  // 低血心跳
  if(P.hp>0 && P.hp<=K.PLAYER_HP*0.3 && (!AU.lastBeat || now-AU.lastBeat>1100)){
    AU.lastBeat=now;
    beep({f:62, f2:38, dur:.14, type:'sine', gain:.14});
    beep({f:58, f2:36, dur:.1, type:'sine', gain:.1, delay:.18});
  }
  if(now < E.stunnedUntil || now < E.frozenUntil || now < E.staggeredUntil || now < E.graceUntil){ E.parryWindow=false; updateSceneUI(); return; }
  let rate = 1;
  if(now < E.slowedUntil) rate *= K.SLOW_FACTOR;
  if(now < E.breatherUntil && now >= E.breachUntil) rate *= 0.5;   // 破绽窗后喘息:半速波谷
  const enraged = R.qInSection > K.ENRAGE_AFTER;
  if(enraged){
    rate *= 1.6;
    if(!E.enrToast){ E.enrToast=true; banner('🔥 狂暴!快收头!'); }
  }
  E.charge += dt * rate;
  const need = E.chargeNeed * 1000;
  // 拨挡窗:预计出手 ≤2.5 秒(第二关起;每充能周期一次)
  const wasParry = E.parryWindow;
  E.parryWindow = R.section>=2 && !E.parryUsed && rate>0 && (need - E.charge)/rate <= 2500;
  if(E.parryWindow && !wasParry){ beep({f:660, dur:.07, type:'square', gain:.09}); }
  document.getElementById('qbox').classList.toggle('parry', !!E.parryWindow);
  while(E.charge >= need && P.hp > 0 && !E.dead){
    E.charge -= need;
    enemyAttack();
  }
  updateSceneUI();
}

/* ============================== 局流程 ============================== */
let RUNS=0; try{ RUNS = Number(localStorage.getItem('ba_runs')||0); }catch(e){}
let PITY=0; try{ PITY = Number(localStorage.getItem('ba_pity')||0); }catch(e){}   // 觉醒 pity:跨局累进
function setPity(n){ PITY=Math.max(0,n); try{ localStorage.setItem('ba_pity', String(PITY)); }catch(e){} }
function startRun(){

}
let lastOfferIds = [];
function gambleLocked(h){ return RUNS<2 && GAMBLE_IDS.includes(h.id); }   // 首局不见赌卡/玻璃鼓
/* ============================== 定时发牌:池子构成(§v5 B) ============================== */
function slotUpgraded(slot){ return P.hexes.some(h=>h.cat==='升级' && h.uSlot===slot); }
function growPool(){ return HEXES.filter(h=>h.grow && !has(h.id) && !gambleLocked(h)); }
function skillCardPool(){ return HEXES.filter(h=>h.cat==='技能' && !has(h.id) && !slotUpgraded(h.skillSlot)); }
function normalPool(){
  return HEXES.filter(h=>!has(h.id) && !gambleLocked(h) && !h.grow && h.cat!=='升级' &&
    (h.cat!=='技能' || !slotUpgraded(h.skillSlot)));
}
function eligibleUpgrades(){   // 觉醒资格:当前槽技能放满 3 次,才配见到它的升级卡
  const out=[];
  ['light','heavy'].forEach(slot=>{
    if(slotUpgraded(slot)) return;
    const sc = ownedSkill(slot);
    const key = sc ? sc.skillKey : (slot==='light'?'small':'big');
    if((P.castCounts[key]||0) < 3) return;
    const want = sc ? sc.id : key;
    HEXES.forEach(u=>{ if(u.cat==='升级' && !has(u.id) && u.upgradeFor===want) out.push(u); });
  });
  return out;
}
function pityBonus(){ return PITY>=3 ? 1 : PITY===2 ? 0.35 : PITY===1 ? 0.15 : 0; }
function weightedDraw(pool, n, wfn){
  const picks=[], p=pool.slice();
  while(picks.length<n && p.length){
    const ws=p.map(h=>Math.max(0.01, wfn?wfn(h):1));
    let r=Math.random()*ws.reduce((a,b)=>a+b,0), i=0;
    while(i<ws.length-1 && (r-=ws[i])>0) i++;
    picks.push(p.splice(i,1)[0]);
  }
  return picks;
}
function rollOffer(roundIdx){
  let picks=[];
  R._offerRar = null;
  if(roundIdx===0){   // 开宗立派:2 技能(1轻1重)+ 2 成长,尽量异系
    const sk=skillCardPool();
    const lights=sk.filter(h=>h.skillSlot==='light'), heavies=sk.filter(h=>h.skillSlot==='heavy');
    const l=lights.length?pick(lights):null;
    let hvc=heavies.filter(h=>!l||h.school!==l.school); if(!hvc.length) hvc=heavies;
    const hv=hvc.length?pick(hvc):null;
    const gp=growPool();
    const g1=gp.length?pick(gp):null;
    let g2c=gp.filter(x=>g1 && x.id!==g1.id && x.school!==g1.school);
    if(!g2c.length) g2c=gp.filter(x=>!g1||x.id!==g1.id);
    const g2=g2c.length?pick(g2c):null;
    picks=[l,hv,g1,g2].filter(Boolean);
  } else {   // 强化抽(R1-R4):先骰整手轮色(Arena式:色随机,一手同色),再按色抓牌
    const TIER_W = [null,
      {silver:.65, gold:.35, prism:0},     // 30s
      {silver:.30, gold:.55, prism:.15},   // 75s
      {silver:.10, gold:.55, prism:.35},   // 2min
      {silver:0,   gold:.40, prism:.60},   // 3min
    ][Math.min(roundIdx,4)];
    let r=Math.random(), tier='gold';
    for(const t of ['silver','gold','prism']){ if((r-=TIER_W[t])<0){ tier=t; break; } }
    // 觉醒槽:独立 roll,不占轮色(它是你养出来的赌局)
    if(roundIdx>=3){
      const elig=eligibleUpgrades();
      let p=0;
      if(elig.length){
        R._upRolled=true;
        p = roundIdx===3 ? Math.min(1, 0.45+pityBonus())
          : (R._upSeen ? 0.30 : Math.min(1, 0.65+pityBonus()));
      }
      if(Math.random()<p) picks.push(pick(elig));
    }
    let pool = normalPool();
    if(roundIdx<=2) pool = pool.concat(growPool());   // 成长卡只活在前两抽(随轮色入池)
    const wf=h=>{
      let w = h.grow ? 0.8 : 1;
      if(h.cat==='技能') w *= ownedSkill(h.skillSlot) ? 0.5 : (roundIdx<=2?1.5:1);
      if(roundIdx<=2 && missedBonds().some(b=>b.pieces.includes(h.id))) w*=1.3;
      return w;
    };
    const n = roundIdx<=2 ? 4 : 3;
    picks.push(...weightedDraw(pool.filter(h=>h.rar===tier && !picks.includes(h)), n-picks.length, wf));
    R._offerRar = tier;
  }
  while(picks.length < (roundIdx<3?4:3)){   // 池干涸兜底
    const fb=HEXES.filter(h=>!has(h.id) && !picks.includes(h) && !gambleLocked(h) && h.cat!=='升级');
    if(!fb.length) break;
    picks.push(pick(fb));
  }
  if(picks.some(h=>h.cat==='升级')){ R._upSeen=true; setPity(0); }   // 出现过即清(拿不拿都算)
  R._offer = picks;
  lastOfferIds = picks.map(x=>x.id);
  return picks;
}
/* ============================== 发牌渲染(战斗覆盖层 + 过关补给共用) ============================== */
const DRAFT_NAMES=['开宗立派','排兵布阵','成长末班车','亮刃','收网'];
const DRAFT_WHEN=['开局','第 30 秒','1 分 15 秒','第 2 分钟','第 3 分钟'];
function draftRoundTag(idx){ const r = idx>0 && R._offerRar ? RAR_LABEL[R._offerRar] : ''; return `⛽ 补给 ${idx+1}/5 · ${DRAFT_NAMES[Math.min(idx,4)]}${r?' · '+r:''}`; }
function renderDraftCards(offer, wrap, roundIdx){
  wrap.innerHTML='';
  const baseAtk = immediateDamage(), baseHv = heavySkill(), baseLt = lightSkill();
  offer.forEach(h=>{
    const el=document.createElement('div');
    const frame = roundIdx===0 ? 'r-id' : (h.cat==='升级' ? 'r-awaken' : `r-${h.rar}`);
    el.className=`card ${frame} sc-${SCHOOL_CLASS[h.school]||'ty'}`;
    el.title=h.cat;
    let delta='';
    P.hexes.push(h);
    {
      const parts=[];
      const a2=immediateDamage(); if(a2!==baseAtk) parts.push(`普攻 ${baseAtk}→<b>${a2}</b>`);
      const h2=heavySkill(); if(h2.name===baseHv.name && h2.dmg!==baseHv.dmg) parts.push(`${h2.name} ${baseHv.dmg}→<b>${h2.dmg}</b>`);
      const l2=lightSkill(); if(l2.cost!==baseLt.cost) parts.push(`轻技 ${baseLt.cost}⚡→<b>${l2.cost}⚡</b>`);
      if(parts.length) delta=`<div class="delta">${parts.slice(0,2).join(' · ')}</div>`;
    }
    P.hexes.pop();
    if(h.skillSlot){
      const cur = ownedSkill(h.skillSlot);
      const slotName = h.skillSlot==='light'?'轻技能':'重技能';
      delta = `<div class="delta">⚔ 你的${slotName}会变成「<b>${h.name}</b>」${cur?`(顶掉 ${cur.ico}${cur.name})`:''}</div>` + delta;
    }
    if(h.cat==='升级'){
      const base=HEXES.find(x=>x.id===h.upgradeFor);
      const bn = base ? base.name : (h.upgradeFor==='small'?'一闪':'擂鼓');
      delta = `<div class="delta up">↗ 觉醒:你的「${bn}」直接进化</div>` + delta;
    }
    const sc = schoolCount(h.school);
    const syn = [];
    BONDS.filter(b=>b.pieces.includes(h.id)).forEach(b=>{
      const others = b.pieces.filter(x=>x!==h.id);
      if(others.every(x=>has(x)))
        syn.push({pri:0, html:`<div class="syn bond">⛓ 选它凑成「${b.name}」→ ${b.desc}</div>`});
      else {
        const oh=HEXES.find(x=>x.id===others[0]);
        syn.push({pri:3, html:`<div class="syn dim">⛓ 和 ${oh.ico}${oh.name} 能凑「${b.name}」→ ${b.desc}</div>`});
      }
    });
    if(RESONANCE[h.school] && sc===1)
      syn.push({pri:1, html:`<div class="syn res">🔗 选它=第 2 张${h.school}卡,触发「${RESONANCE[h.school].name}」→ ${RESONANCE[h.school].desc}</div>`});
    const statusTags = syn.sort((a,b)=>a.pri-b.pri).slice(0,2).map(t=>t.html).join('');
    const grptag = roundIdx===0 ? `<div class="grouptag">${h.cat==='技能'?'⚔ 换一手技':'🌱 养一条路'}</div>` : '';
    const idl = (roundIdx<=2 && h.idline) ? `<div class="idline">${h.idline}</div>` : '';
    const upBadge = h.cat==='升级' ? '<span class="upmark">↗</span>' : '';
    const pityTag = (roundIdx===0 && h.cat==='技能' && PITY>0) ? `<div class="pitytag">${PITY>=3?'觉醒·就在下一手':'觉醒·近了'}</div>` : '';
    const badge = roundIdx===0 ? '' : (h.cat==='升级' ? '<div class="rarbadge awaken">↗ 觉醒</div>' : `<div class="rarbadge ${h.rar}">${RAR_LABEL[h.rar]}</div>`);
    el.innerHTML=`${badge}
      ${grptag}
      <div class="ico">${h.ico}</div>
      <div class="name">${h.name}${upBadge}${h.ba?' <span class="bastar">★</span>':''}</div>
      ${idl}
      <div class="flavor">「${h.fl}」</div>
      <div class="desc">${h.desc}</div>
      ${delta}
      ${statusTags}
      ${pityTag}
      <div class="schooltag">${SCHOOL_LABEL[h.school]||h.school}${sc?` · 已持 ${sc} 张`:''}</div>`;
    el.onclick=()=>pickHexFromDraft(h);
    wrap.appendChild(el);
  });
}

function pickHexFromDraft(h){   // UI 唯一入口:双击/迟到点击直接吞掉(修重开本关 bug)

function applyHexPick(h){
  const resBefore = activeResonances().length;
  const bondsBefore = activeBonds().map(b=>b.id);
  P.hexes.push(h);
  // 成长卡预热:拿到自带 2 层(晚拿不亏成断崖)
  if(h.id==='g01') P.furCoat=Math.max(P.furCoat,2);
  else if(h.id==='g02') P.skillDisc=Math.max(P.skillDisc,6);
  else if(h.id==='g03') P.leafSpread=Math.max(P.leafSpread,0.10);
  else if(h.id==='g04') P.drumAtk=Math.max(P.drumAtk,2);
  else if(h.id==='h13') P.bloodBonus=Math.min(20,P.bloodBonus+4);
  const newBond = activeBonds().find(b=>!bondsBefore.includes(b.id)) || null;
  const newRes = activeResonances().length>resBefore ? RESONANCE[h.school] : null;
  return {newBond, newRes};
}
function pickBanner(h, r){
  if(r.newBond) return `⛓ 羁绊结成 · ${r.newBond.ico}${r.newBond.name}!`;

  if(CUR_SCREEN!=='battle' || !E || E.dead || E.phaseClear || P.hp<=0) return;
  if(PANEL_OPEN){ setTimeout(nextQuestion, 350); return; }   // 面板开着不出题(轮询,面板关后≤350ms出题)
  if(DRAFT_OPEN || R._draftLock) return;   // 发牌中不出题:closeBattleDraft 会亲自续上
  R.qInSection++;
  telem.globalQ++;
  if(R.qInSection > K.ENRAGE_AFTER-3 && R.qInSection <= K.ENRAGE_AFTER && E && !E.enrToast){
    toast(`⏳ 狂暴还剩 ${K.ENRAGE_AFTER - R.qInSection + 1} 题——够不够破关?`);
  }
  q = genQuestion(R.section-1);
  document.getElementById('qCount').textContent = `第 ${R.qInSection} 题`;
  document.getElementById('qType').textContent = TYPE_LABEL[q.type];
  const qd=document.getElementById('qDiff'); qd.textContent={easy:'★',medium:'★★',hard:'★★★'}[q.difficulty]; qd.className='qdiff '+q.difficulty;
  const pe=document.getElementById('qPrompt'); pe.textContent=q.prompt;
  pe.className = q.mc ? 'qprompt qp-mc' : 'qprompt ' + (q.prompt.length<=11?'qp-l':q.prompt.length<=18?'qp-m':'qp-s');
  renderOpts();
  void pe.offsetWidth; pe.classList.add('qin');   // 新题落地拍
  document.getElementById('qbox').classList.remove('good','bad');
  document.getElementById('qBonus').classList.remove('drained');
  const inp=document.getElementById('qInput'); inp.value=''; inp.disabled=false;
  P._betweenQ = false;
  if(!IS_TOUCH) inp.focus();
  qStart = Date.now();
  q._remain = null;
  const timeout = q.benchmark * K.TIMEOUT_FACTOR;
  document.getElementById('qBench').style.left = (100/K.TIMEOUT_FACTOR)+'%';
  const fill=document.getElementById('qTimerFill'); fill.style.transition='none'; fill.style.width='100%';
  void fill.offsetWidth;
  fill.style.transition=`width ${timeout}s linear`; fill.style.width='0%';
  document.getElementById('qZone').classList.remove('hidden');   // 千钧区全民可见
  clearTimeout(qTimer);
  qTimer = setTimeout(()=>onTimeout(), timeout*1000);
  updateHUD();
}
function actualTime(){ return (Date.now()-qStart)/1000; }
function renderOpts(){
  const qo=document.getElementById('qOpts');
  if(!q || !q.mc){ qo.classList.add('hidden'); return; }
  qo.classList.remove('hidden');
  qo.innerHTML='';
  q.opts.forEach((t,i)=>{
    const b=document.createElement('div'); b.className='qopt';
    const n=document.createElement('span'); n.className='qn'; n.textContent=i+1;
    b.appendChild(n); b.appendChild(document.createTextNode(t));
    b.onclick=()=>{
      const inp=document.getElementById('qInput');
      if(inp.disabled || P.hp<=0 || CUR_SCREEN!=='battle') return;
      inp.value=String(i+1); onTyped();
    };
    qo.appendChild(b);
  });
}

function submitAnswer(){
  if(!q || P.hp<=0 || PANEL_OPEN || DRAFT_OPEN || R._draftLock || P._betweenQ || document.getElementById('qInput').disabled) return;
  const val = parseInt(document.getElementById('qInput').value,10);
  if(isNaN(val)) return;
  clearTimeout(qTimer);
  const fill=document.getElementById('qTimerFill');
  fill.style.transition='none'; fill.style.width='0%';   // 定住计时条,结束这一拍
  if(val===q.answer) onCorrect();
  else onBreak('答错');
}
/* 反馈打在眼睛所在的位置:题目区本身 */
function showQFeedback(type, text, cls){
  const pe=document.getElementById('qPrompt');
  pe.textContent=text;
  pe.className='qprompt '+(cls==='qfb-mc'?'qp-m':'qp-l')+' '+type+(cls&&cls!=='qfb-mc'?' '+cls:'');
  const qb=document.getElementById('qbox');
  qb.classList.remove('good','bad'); void qb.offsetWidth; qb.classList.add(type);
  document.getElementById('qInput').value='';
}
/* 鬼泣式升级喝彩 */
function comboCallout(c){
  if(c>=12) return {t:`无我境界 ×${c}`, cls:'co4'};
  if(c>=9)  return {t:`心流!×${c}`,   cls:'co3'};
  if(c>=6)  return {t:`凌厉 ×${c}`,   cls:'co2'};
  if(c>=3)  return {t:`流畅 ×${c}`,   cls:'co1'};
  return {t:'✓ 命中', cls:'co0'};
}
function flashFx(){
  const f=document.getElementById('flash');
  f.classList.add('on');
  setTimeout(()=>f.classList.remove('on'), 90);
}
function onTyped(){
  const inp=document.getElementById('qInput');
  if(!q || inp.disabled || PANEL_OPEN || DRAFT_OPEN || R._draftLock) return;
  inp.value = inp.value.replace(/\D/g,'');
  inp.classList.remove('pop'); void inp.offsetWidth; inp.classList.add('pop');
  beep({f:820+inp.value.length*90, dur:.035, type:'triangle', gain:.05});
  if(inp.value.length >= String(q.answer).length) submitAnswer();
}

/* ============================== 结算 (§12) ============================== */
function onCorrect(){
  const at = actualTime();
  const blade = inBladeZone(at);
  const boatUsed = consumeBoatPush();
  const fast = at < q.benchmark || boatUsed;   // 速度引擎只认真实速度;顺水推舟是唯一例外(付过 50⚡ 轻技)
  // 追风:快答叠风层(动量),慢答清零——易碎的成长
  if(has('h04')){
    if(fast){ P.windStacks = Math.min(5, (P.windStacks||0)+1); hexFire('h04', `风×${P.windStacks}`); }
    else if(P.windStacks>0){ P.windStacks = 0; floatText('🚀 风散了', '#7e8db0', true, false, 'you'); }
  }
  // 时间递减奖池:满额起步,基准×DECAY_WINDOW 内线性蒸发(封顶不变,不超模)+ 风层动量
  let s = clamp(1 - at/(q.benchmark*K.DECAY_WINDOW), 0, 1) * speedCap() + windBonus();
  if(boatUsed && at >= q.benchmark){ s = speedCap() + windBonus(); hexFire('x01','算你快答'); }
  let base = K.ENERGY_BASE + K.ENERGY_PER_COMBO*P.combo;
  if(has('h07')) base *= 0.6;
  let perQ = base * (1+s);
  if(q.difficulty==='hard' && has('h05')){ perQ += 15; hexFire('h05','+15⚡'); }
  P.energy = Math.min(K.ENERGY_MAX, P.energy + perQ);
  if(has('x03') && isControlled()){ P.energy = Math.min(K.ENERGY_MAX, P.energy+10); hexFire('x03','+10⚡'); }

  const uPrev = tierUnlocks(P.combo);
  P.combo++;
  telem.correct++;
  telem.maxCombo = Math.max(telem.maxCombo, P.combo);
  P._betweenQ = true;
  // 成长卡计数:第 3 关起速率×2(终局冲刺,保证兑现)
  {
    const gi = R.section>=K.SECTIONS ? 2 : 1;
    if(has('g01')){ P._g01c=(P._g01c||0)+gi; while(P._g01c>=2 && P.furCoat<10){ P._g01c-=2; P.furCoat++; hexFire('g01',`+1攻(累计+${P.furCoat})`); } }
    if(has('g02')){ P._g02c=(P._g02c||0)+gi; while(P._g02c>=3 && P.skillDisc<18){ P._g02c-=3; P.skillDisc+=3; hexFire('g02',`技能省${P.skillDisc}⚡`); } }
    if(has('g03')){ P._g03c=(P._g03c||0)+gi; while(P._g03c>=3 && P.leafSpread<0.299){ P._g03c-=3; P.leafSpread=Math.min(0.30, Math.round((P.leafSpread+0.05)*100)/100); hexFire('g03',`溅射+${Math.round(P.leafSpread*100)}%`); } }
    if(has('g04')){ P._drumFaded=false; if(P.drumAtk<12){ P.drumAtk=Math.min(12, P.drumAtk+gi); hexFire('g04',`+攻(累计+${P.drumAtk})`); } }
  }
  if(blade){
    if(has('h15')){ hexFire('h15','千钧+50%·回10⚡'); P.energy=Math.min(K.ENERGY_MAX,P.energy+10); }
    else floatText('⏳ 千钧 +25%', '#ffcf4d', true, false, 'you');
  }
  // 拨挡:预警窗内答对=击退+硬直(它抬手,你出手)
  let parried = false;
  if(E && E.parryWindow && !E.parryUsed && !E.dead && !P.judge){
    parried = true;
    E.parryUsed = true; E.parryWindow = false;
    if(has('h17')){
      E.charge = E.chargeNeed*1000*0.5;
      P.energy = Math.min(K.ENERGY_MAX, P.energy+15);
      hexFire('h17','打断·偷15⚡');
    } else {
      E.charge = Math.max(0, E.charge - 2000);
    }
    E.staggeredUntil = Date.now()+1800;
    banner('🛡 拨挡!');
    SFX.kill();
    if(fast) setTimeout(()=>{ if(E && !E.dead) dealDamage(Math.round(immediateDamageRaw()*0.5), '拨挡反击', '#3fe7ff', true); }, 150);
  }
  const co = comboCallout(P.combo);
  showQFeedback('good', co.t, co.cls);
  SFX.correct(P.combo);
  // 共鸣·时间凝滞:快答冻结敌人充能
  if(fast && hasRes('心') && E && !E.dead){ E.frozenUntil = Date.now()+2000; }
  const beforeTier = comboTier(P.combo-1);
  let dmg = immediateDamage();
  if(blade) dmg = Math.round(dmg * (has('h15') ? 1.5 : 1.25));   // 千钧区:全民+25%,h15+50%
  if(parried && has('h17')) dmg = Math.round(dmg*1.5);           // 趁火打劫:拨挡那一刀×1.5
  const consumedDouble = P.nextImmDouble;
  P.nextImmDouble=false;
  dealDamage(dmg, consumedDouble?'出鞘':'普攻', consumedDouble?'#ffcf4d':'#43e08a');

  if(has('h07')) hexFire('h07','攻击 16 起步');
  const u = tierUnlocks(P.combo);
  if(u.splash && !uPrev.splash){ banner(has('h01')?'🔓 溅射解锁!❄️早雪提前':'🔓 溅射 解锁!'); SFX.tierUp(); hexFire('h01'); }
  if(u.slow && !uPrev.slow){ banner(has('h01')?'🔓 减速解锁!❄️早雪提前':'🔓 减速 解锁!'); SFX.tierUp(); hexFire('h01'); }
  if(u.double && !uPrev.double){ banner(has('h03')?'🔓 双响解锁!⚡山鸣提前':(has('h01')?'🔓 双响解锁!❄️早雪提前':'🔓 双响 解锁!')); SFX.tierUp(); hexFire('h03'); hexFire('h01'); }
  if(u.splash){
    let ratio = splashRatio();
    const controlled = isControlled();
    if(has('h08') && controlled) ratio *= 2;   // 刀花:受控敌人吃双倍溅射(控制流喂输出流)
    dealDamage(Math.round(dmg*ratio), controlled&&has('h08')?'溅射·受控':'溅射', '#3fe7ff', true);
    hexFire('h08', controlled&&has('h08')?'受控翻倍':undefined);
  }
  if(u.slow) applySlow();
  if(u.double) dealDamage(immediateDamageRaw(), '双响', '#b561ff');

  // 共鸣·三连锁:每第 3 次答对,即时层整套再触发一次
  if(hasRes('手')){
    P.chainCount++;
    if(P.chainCount>=3 && E && !E.dead){
      P.chainCount=0;
      const extra = immediateDamageRaw();
      dealDamage(extra, '连锁', '#ffb1e6');
      if(u.splash) dealDamage(Math.round(extra*splashRatio()), '连锁溅射', '#ffb1e6', true);
      floatText('⛓ 三连锁!', '#ffb1e6', true, false, 'you');
    }
  }

  resolveDot();
  if(has('h09')) P.dotQueue.push({ left:2, amount:Math.round(dmg*0.5) });
  // 连擂:震慑窗内答对追锤
  if(has('u08') && Date.now()<P.hotIronUntil && E && !E.dead){ dealDamage(immediateDamageRaw(),'连擂','#ffcf4d',true); hexFire('u08'); }
  // 余音绕梁:重技后 3 题答对带回声
  if(P.echoLeft>0 && E && !E.dead){
    P.echoLeft--;
    dealDamage(immediateDamageRaw(),'余音','#ffb1e6',true);
    if(P.echoLeft===0) floatText('🔔 余音散了', '#7e8db0', true, false, 'you');
  }

  // 抢答:伤害结算之后再上膛,保证翻倍作用于「下一刀」而非本刀
  if(has('h06')){
    const need = 3;
    if(fast){ P.consecutiveFast++; if(P.consecutiveFast>=need){ P.nextImmDouble=true; P.consecutiveFast=0; banner('🎯 出鞘!下一刀翻倍'); hexFire('h06'); } }
    else P.consecutiveFast=0;
  }

  if(P.energy >= bigCost() && P.overloadStacks < overloadMax()){
    P.overloadStacks++; telem.overloadUses++;
    SFX.odUp(P.overloadStacks);
    floatText(`过载 +1(${P.overloadStacks})`, '#b561ff', true, false, 'you');
    if(has('h11')) hexFire('h11', `+${2*P.overloadStacks}攻`);
  }

  if(has('h14') && R.qInSection % 5 === 0 && !E.dead){
    dealDamage(Math.round(baseImmediate()*1.5), '招式', '#ffcf4d', true); applySlow();
    hexFire('h14','控制小招!');
  }

  const afterTier = comboTier(P.combo);
  if(afterTier>beforeTier) markEvent();
  if(consumedDouble) markEvent();
  if(P._wasBroken){ telem.recoveredAfterBreak++; P._wasBroken=false; }

  // 成王败寇:审判兑现
  if(P.judge){
    const j = P.judge; P.judge = null;
    dealDamage(j.snap*2, '成王败寇', '#ffcf4d', false, true);
    if(j.stun) applyStun();
    P.energy = Math.min(K.ENERGY_MAX, P.energy+30);
    banner(`👑 成王!${j.snap}×2`);
    SFX.win();
    flashFx();
  }
  // 羁绊连答引擎:每答对推一格,到点触发
  P.streak++;
  activeBonds().forEach(b=>{ if(P.streak % b.need === 0) fireBond(b); });
  renderStreak();

  bumpStats();
  afterAction();
}

function resolveDot(){
  if(!P.dotQueue.length || E.dead) return;
  const groups={};
  P.dotQueue.forEach(d=>{ if(d.left>0){ const k=d.kind||'灼烧'; groups[k]=(groups[k]||0)+d.amount; d.left--; } });
  P.dotQueue = P.dotQueue.filter(d=>d.left>0);
  Object.keys(groups).forEach(k=>{
    if(groups[k]<=0) return;
    dealDamage(groups[k], k, k==='灼烧'?'#ff5470':'#3fe7ff', true);
    hexFire(k==='灼烧'?'h09':'u02');
  });
}

function onTimeout(){ onBreak('超时'); }
function onBreak(reason){
  if(!q || CUR_SCREEN!=='battle') return;   // 旧局漏进来的超时:吞掉
  document.getElementById('qInput').disabled=true;
  telem.breaks++;
  telem.lastEvents.push({q:telem.globalQ, txt:`第${telem.globalQ}题${reason}`});
  if(telem.lastEvents.length>3) telem.lastEvents.shift();
  // 已声明赌局的输端:只动定价内的资源,过载豁免崩塌
  let gambleSpared = false, skipCounter = false;
  if(P.judge){
    P.judge = null; gambleSpared = true;
    floatText('👑 败寇…押空', '#ff5470', false, true, 'you');
    SFX.odCrash();
  }
  if(E && !E.dead && E.parryWindow && !E.parryUsed && has('h17') && reason==='答错'){
    E.parryUsed = true; E.parryWindow = false;
    E.nextAtkMult = 2; gambleSpared = true; skipCounter = true;
    hexFire('h17','失手!下次挨打×2');
  }
  P._betweenQ = true;
  showQFeedback('bad', q.mc ? `✗ 答案:${q.opts[q.answer-1]}` : `✗ 答案 ${q.answer}`, q.mc?'qfb-mc':'');
  SFX.wrong();
  const t = thresholds();
  if(has('h02')){ P.combo = P.combo>=t[2]?t[2] : P.combo>=t[1]?t[1] : P.combo>=t[0]?t[0] : 0; hexFire('h02','档位保留'); }
  else { P.combo = Math.floor(P.combo/2); }
  // 赌局的风险端(SPEC §9:没放出去就断连 = 白攒):过载层崩塌
  if(P.overloadStacks>0 && !gambleSpared){
    telem.odCrash++;
    if(telem.lastEvents.length) telem.lastEvents[telem.lastEvents.length-1].txt += `→过载崩塌−${P.overloadStacks}层`;
    banner(`💥 过载崩塌 −${P.overloadStacks}层`);
    SFX.odCrash();
    P.overloadStacks = 0;
  }
  P._wasBroken = true;
  P.windStacks = 0;   // 追风:断连风散
  P.boatPush = false;   // 顺水推舟:答错也消耗
  if(has('g04') && P.drumAtk>0){   // 一鼓作气:一错掉一半,连错全没
    if(P._drumFaded){ P.drumAtk=0; floatText('🥁 鼓声断了,全没了', '#ff5470', false, true, 'you'); }
    else { P.drumAtk=Math.floor(P.drumAtk/2); P._drumFaded=true; floatText(`🥁 鼓声乱了,剩+${P.drumAtk}`, '#ff5470', false, false, 'you'); }
  }
  P.streak = 0; renderStreak();   // 羁绊连答:一错清零
  if(!skipCounter && reason==='答错' && has('h15') && inBladeZone(actualTime()) && E && !E.dead){
    E.charge = E.chargeNeed*1000;   // 千钧失手:敌人立刻出手
    floatText('⏳ 千钧失手!', '#ff5470', false, true, 'you');
  } else if(!skipCounter && E && !E.dead) E.charge += E.chargeNeed*1000*0.25;   // 乘虚而入:攻击充能突进
  shakeScene();
  toast(`💢 断连(${reason})!敌人乘虚而入 · 能量保留`);
  afterAction(true);
}

/* 技能槽形态由技能卡决定(ownedSkill),旧主修变形系统已移除 v4.5 */
function ownedSkill(slot){
  for(let i=P.hexes.length-1;i>=0;i--){ if(P.hexes[i].skillSlot===slot) return P.hexes[i]; }
  return null;
}
function lightSkill(){
  const sc = ownedSkill('light');
  const key = sc ? sc.skillKey : 'small';
  const cost = skillCost('light', key);
  if(key==='swap'){
    if(has('u01')) return {key:'swap', name:'砸卷', cost, od:'扔题砸它 ×2,换来简单题', dmg:immediateDamageRaw()*2};
    return {key:'swap', name:'撕卷', cost, od:'这题不要了,换一题', dmg:0};
  }
  if(key==='shield') return {key:'shield', name:has('u03')?'泼雨':'撑伞', cost, od:has('u03')?'挡 2 刀,每挡泼回去+回能':'挡住 2 次攻击', dmg:0};
  if(key==='flurry') return {key:'flurry', name:has('u02')?'追浪':'起浪', cost, od:has('u02')?'×2 连击+2,后 2 题追浪':'打一下,连击+2', dmg:immediateDamage()*2};
  if(has('u07'))     return {key:'small', name:'再闪', cost, od:'两刀,每刀 ×2', dmg:immediateDamage()*2+immediateDamageRaw()*2};
  return {key:'small', name:'一闪', cost, od:`攻击 × ${K.SMALL_MULT}`, dmg:immediateDamage()*K.SMALL_MULT};
}
function heavySkill(){
  const odMult = 1 + K.OVERLOAD_PER_STACK*P.overloadStacks;
  const hammer = has('h10') ? 1.5 : 1;   // h10 一锤:重技 ×1.5(默认擂鼓 6→9)
  const sc = ownedSkill('heavy');
  const key = sc ? sc.skillKey : 'big';
  let v;
  if(key==='avalanche')     v={key:'avalanche', name:has('u05')?'封山':'雪崩', base:4*(1+0.02*P.combo), od:has('u05')?'连击越高越疼,封山 5 秒':'连击越高越疼,还定住它', stun:true};
  else if(key==='timestop') v={key:'timestop',  name:has('u06')?'偷秒':'掐表', base:4, od:has('u06')?'×4,冻 5 秒,这题+5 秒':'×4,定住敌人 5 秒', freeze:5000};
  else if(key==='calc')     v={key:'calc',      name:has('u04')?'回本':'回血', base:4, od:has('u04')?'×4,回 30⚡,下次轻技免费':'×4,回 30 能量', regen:30};
  else                      v={key:'big',       name:has('u08')?'连擂':'擂鼓',     base:K.BIG_MULT, od:has('u08')?`×${K.BIG_MULT}+震慑,3 秒内答对追锤`:`攻击 × ${K.BIG_MULT} + 震慑`, stun:true};
  v.cost = skillCost('heavy', key);
  v.dmg = Math.round(immediateDamage()*v.base*hammer*odMult);
  return v;
}
function swapQuestion(forceDiff){
  // 换题:弃掉当前题,原地换新(计时重置,不算断连)
  q = genQuestion(R.section-1, forceDiff);
  document.getElementById('qType').textContent = TYPE_LABEL[q.type];
  const qd=document.getElementById('qDiff'); qd.textContent={easy:'★',medium:'★★',hard:'★★★'}[q.difficulty]; qd.className='qdiff '+q.difficulty;
  const pe=document.getElementById('qPrompt'); pe.textContent=q.prompt;
  pe.className = q.mc ? 'qprompt qp-mc' : 'qprompt ' + (q.prompt.length<=11?'qp-l':q.prompt.length<=18?'qp-m':'qp-s');
  renderOpts();
  void pe.offsetWidth; pe.classList.add('qin');
  const inp=document.getElementById('qInput'); inp.value=''; inp.disabled=false;
  qStart = Date.now();
  q._remain = null;
  const timeout = q.benchmark * K.TIMEOUT_FACTOR;
  const fill=document.getElementById('qTimerFill'); fill.style.transition='none'; fill.style.width='100%';
  void fill.offsetWidth;
  fill.style.transition=`width ${timeout}s linear`; fill.style.width='0%';
  clearTimeout(qTimer);

  }

  consumeImmDouble();   // 重技全系带伤害,统一吃掉翻倍(dot 快照也已按翻倍计)
