<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脑力竞技 · 对战原型</title>
<style>
  :root{
    --bg:#070b16; --panel:#0f1626; --panel2:#16203a; --line:#26324d;
    --cyan:#36e3ff; --blue:#4d7cff; --gold:#ffcf4d; --red:#ff4d6d;
    --green:#3ddc84; --purple:#b15dff; --text:#eaf1ff; --dim:#8a98b8; --silver:#c3ccde;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:#05070d; color:var(--text); font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; overflow:hidden; user-select:none;}
  #app{width:min(1000px,100vw); height:min(620px,100vh); position:relative; background:var(--panel);
    border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 30px 90px rgba(0,0,0,.7);}
  .screen{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:22px; gap:13px;}
  .hidden{display:none !important;}
  h1{font-size:34px; letter-spacing:3px; background:linear-gradient(90deg,var(--cyan),var(--purple)); -webkit-background-clip:text; background-clip:text; color:transparent; text-align:center; filter:drop-shadow(0 2px 18px rgba(54,227,255,.4));}
  .sub{color:var(--dim); font-size:13.5px; text-align:center; line-height:1.7; max-width:620px;}
  .tag{font-size:12px; color:var(--cyan); border:1px solid var(--cyan); padding:3px 10px; border-radius:20px; opacity:.85;}
  button{font-family:inherit; cursor:pointer; border:none; color:var(--text);}
  .btn{padding:14px 38px; font-size:18px; font-weight:800; letter-spacing:1px; border-radius:12px; background:linear-gradient(90deg,var(--blue),var(--cyan)); color:#06121f; transition:transform .08s, box-shadow .2s; box-shadow:0 10px 30px rgba(54,227,255,.35);}
  .btn:hover{transform:translateY(-2px) scale(1.02);}
  .btn.ghost{background:transparent; border:1px solid var(--line); color:var(--text); box-shadow:none;}
  .tunbtn{font-size:12px; color:var(--dim); background:none; border:1px solid var(--line); padding:6px 14px; border-radius:8px;}

  /* start hero */
  #start{background:radial-gradient(900px 500px at 50% -10%, #14233f 0%, transparent 55%), radial-gradient(700px 460px at 50% 120%, #241433 0%, transparent 55%);}
  .heroduel{display:flex; align-items:center; gap:26px; margin:4px 0;}
  .heroduel .h{font-size:64px; filter:drop-shadow(0 6px 16px rgba(0,0,0,.6));}
  .heroduel .h.l{animation:bobL 2.4s ease-in-out infinite;}
  .heroduel .h.r{animation:bobR 2.4s ease-in-out infinite; transform:scaleX(-1);}
  .heroduel .vs{font-size:26px; font-weight:900; color:var(--gold); text-shadow:0 0 18px rgba(255,207,77,.6);}
  @keyframes bobL{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  @keyframes bobR{0%,100%{transform:scaleX(-1) translateY(0);}50%{transform:scaleX(-1) translateY(-7px);}}

  /* tuner */
  .tuner{display:none; flex-direction:column; gap:6px; background:#0c1322; border:1px solid var(--line); border-radius:12px; padding:14px 18px; width:min(560px,92%);}
  .tuner.open{display:flex;}
  .tuner h3{font-size:13px; color:var(--cyan); margin-bottom:2px;}
  .trow{display:flex; align-items:center; gap:10px; font-size:12px;}
  .trow label{flex:1; color:var(--dim);}
  .trow input{width:90px; background:#16203a; border:1px solid var(--line); color:var(--text); border-radius:6px; padding:5px 8px; font-family:inherit; font-size:13px;}

  /* augment cards */
  .cards{display:flex; gap:15px; flex-wrap:wrap; justify-content:center;}
  .card{width:214px; min-height:244px; background:linear-gradient(180deg,var(--panel2),#0c1322); border:1px solid var(--line); border-radius:15px; padding:15px; cursor:pointer; display:flex; flex-direction:column; gap:6px; position:relative; transition:transform .12s, box-shadow .2s; overflow:hidden;}
  .card::after{content:""; position:absolute; inset:0; background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,.06) 50%,transparent 60%); transform:translateX(-100%); transition:transform .5s;}
  .card:hover::after{transform:translateX(100%);}
  .card:hover{transform:translateY(-7px) scale(1.03);}
  .card .ico{font-size:30px; filter:drop-shadow(0 3px 8px rgba(0,0,0,.5));}
  .card .name{font-size:18px; font-weight:800;}
  .card .desc{font-size:12.5px; color:var(--dim); line-height:1.5; flex:1;}
  .card .row1{display:flex; gap:5px; flex-wrap:wrap;}
  .chiptag{font-size:10px; font-weight:800; padding:1px 6px; border-radius:4px; background:#0a0f1d;}
  .chiptag.chips{color:var(--cyan); border:1px solid #1e4a55;}
  .chiptag.addmult{color:var(--gold); border:1px solid #5a4a1a;}
  .chiptag.xmult{color:var(--purple); border:1px solid #4a2a6a;}
  .chiptag.util{color:var(--dim); border:1px solid var(--line);}
  .card .syn{font-size:11px; color:var(--gold); min-height:14px; line-height:1.4;}
  .tierbadge{position:absolute; top:12px; right:12px; font-size:10px; font-weight:800; letter-spacing:1px; padding:2px 7px; border-radius:5px; z-index:1;}
  .card.tier-silver{border-color:#566;} .card.tier-silver .tierbadge{background:#2a3242; color:var(--silver);}
  .card.tier-gold{border-color:#7a651f;} .card.tier-gold .tierbadge{background:#3a2f0e; color:var(--gold);} .card.tier-gold:hover{box-shadow:0 14px 34px rgba(255,207,77,.28);}
  .card.tier-prismatic{border:1px solid transparent; background:linear-gradient(#0c1322,#0c1322) padding-box, linear-gradient(135deg,var(--purple),var(--cyan),var(--gold)) border-box;}
  .card.tier-prismatic .tierbadge{background:linear-gradient(135deg,var(--purple),var(--cyan)); color:#06121f;}
  .card.tier-prismatic:hover{box-shadow:0 16px 42px rgba(177,93,255,.45);}
  .card.tier-prismatic .name{background:linear-gradient(90deg,var(--purple),var(--cyan),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .pickhdr{text-align:center;}
  .pickhdr .big{font-size:22px; font-weight:800;}
  .pickhdr .ph{font-size:12px; color:var(--cyan); letter-spacing:1px;}
  .foesum{margin-top:5px; font-size:12px; color:var(--dim); display:flex; gap:6px; align-items:center; justify-content:center; flex-wrap:wrap;}
  .foesum .fc{color:var(--red); border:1px solid #4a2a33; background:#1a1014; padding:2px 8px; border-radius:14px; font-size:11px;}
  .rerollrow{margin-top:2px;}
  .reroll{font-size:13px; font-weight:700; padding:8px 18px; border-radius:8px; background:#16203a; border:1px solid var(--line); color:var(--cyan);}
  .reroll:hover{background:#1d2a4a;} .reroll:disabled{opacity:.4; cursor:default; color:var(--dim);}

  /* ===== BATTLE ===== */
  #battle{padding:0; justify-content:flex-start; gap:0;}
  .hudbar{width:100%; padding:7px 0; text-align:center; border-bottom:1px solid var(--line); background:#0b1120; z-index:3;}
  .hudbar .rn{font-size:15px; font-weight:800;} .hudbar .qc{font-size:11px; color:var(--dim); letter-spacing:1px;}

  .stage{position:relative; flex:1; width:100%; overflow:hidden;
    background:
      radial-gradient(600px 300px at 25% 40%, rgba(54,227,255,.10), transparent 60%),
      radial-gradient(600px 300px at 75% 40%, rgba(255,77,109,.10), transparent 60%),
      linear-gradient(180deg,#0a1326 0%, #0c1020 55%, #070b13 100%);}
  .stage::before{content:""; position:absolute; left:0; right:0; bottom:0; height:42%;
    background:linear-gradient(180deg, transparent, rgba(54,227,255,.05)), repeating-linear-gradient(90deg, rgba(80,120,200,.10) 0 1px, transparent 1px 46px);
    transform:perspective(380px) rotateX(60deg); transform-origin:bottom; opacity:.5;}
  .glow{position:absolute; border-radius:50%; filter:blur(48px); opacity:.5; animation:drift 9s ease-in-out infinite;}
  .glow.a{width:200px;height:200px;background:#1f6f9c;left:8%;top:18%;}
  .glow.b{width:220px;height:220px;background:#7a2a52;right:8%;top:14%;animation-delay:-4s;}
  @keyframes drift{0%,100%{transform:translateY(0);}50%{transform:translateY(18px);}}

  .fighter{position:absolute; bottom:14px; width:230px; display:flex; flex-direction:column; align-items:center; gap:7px; z-index:2;}
  .fighter.me{left:24px;} .fighter.foe{right:24px;}
  .fname{font-size:12px; color:var(--dim); display:flex; justify-content:space-between; width:100%;}
  .fname b{color:var(--text);}
  .hpwrap{width:100%; height:15px; background:#0a0f1d; border-radius:9px; overflow:hidden; border:1px solid var(--line); position:relative;}
  .hp{height:100%; width:100%; transition:width .45s cubic-bezier(.2,.8,.2,1); border-radius:9px;}
  .hp.me{background:linear-gradient(90deg,#3ddc84,#36e3ff);}
  .hp.foe{background:linear-gradient(90deg,#ff8a4d,#ff4d6d);}
  .hpghost{position:absolute; top:0; height:100%; background:rgba(255,255,255,.35); transition:width .9s ease .15s;}
  .marks{font-size:11px; min-height:14px; color:var(--purple); font-weight:800;}
  .avatar{font-size:78px; line-height:1; filter:drop-shadow(0 8px 14px rgba(0,0,0,.55)); transition:filter .1s;}
  .avatar.me{animation:idleL 2.6s ease-in-out infinite;}
  .avatar.foe{animation:idleR 2.6s ease-in-out infinite;}
  @keyframes idleL{0%,100%{transform:translateY(0) scaleX(1);}50%{transform:translateY(-6px) scaleX(1);}}
  @keyframes idleR{0%,100%{transform:translateY(0) scaleX(-1);}50%{transform:translateY(-6px) scaleX(-1);}}
  .avatar.lungeL{animation:lungeL .4s ease;} @keyframes lungeL{0%{transform:translateX(0);}35%{transform:translateX(40px) scale(1.08);}100%{transform:translateX(0);}}
  .avatar.lungeR{animation:lungeR .4s ease;} @keyframes lungeR{0%{transform:scaleX(-1) translateX(0);}35%{transform:scaleX(-1) translateX(40px) scale(1.08);}100%{transform:scaleX(-1) translateX(0);}}
  .avatar.hurt{animation:hurt .4s ease; filter:drop-shadow(0 0 14px var(--red)) brightness(1.6) saturate(.4);}
  @keyframes hurt{0%,100%{}20%{transform:translateX(-8px) rotate(-4deg);}60%{transform:translateX(6px) rotate(3deg);}}
  .fbuild{display:flex; gap:3px; flex-wrap:wrap; justify-content:center; max-width:100%; min-height:18px;}
  .fbuild .b{font-size:13px; transition:transform .15s;} .fbuild .b.fire{transform:scale(1.5);}

  .center{position:absolute; left:0; right:0; top:8%; display:flex; flex-direction:column; align-items:center; gap:4px; pointer-events:none; z-index:4;}
  .tally{min-height:34px; font-weight:900; display:flex; gap:8px; align-items:baseline; justify-content:center; flex-wrap:wrap; opacity:0;}
  .tally.show{animation:pop .5s ease;}
  @keyframes pop{0%{opacity:0; transform:scale(.6);}30%{opacity:1; transform:scale(1.15);}100%{opacity:1; transform:scale(1);}}
  .tally .chips{color:var(--cyan); font-size:19px;} .tally .x{color:var(--dim); font-size:14px;}
  .tally .mult{color:var(--gold); font-size:19px;} .tally .eq{color:var(--dim); font-size:14px;}
  .tally .dmg{color:var(--red); font-size:26px;} .tally .dmg.crit{color:var(--gold); font-size:32px; text-shadow:0 0 16px rgba(255,207,77,.7);}

  #shots{position:absolute; inset:0; pointer-events:none; z-index:5; overflow:hidden;}
  .shot{position:absolute; width:26px; height:26px; border-radius:50%; box-shadow:0 0 18px 4px currentColor; will-change:transform;}
  .impact{position:absolute; border-radius:50%; pointer-events:none; animation:imp .4s ease-out forwards;}
  @keyframes imp{0%{opacity:.9; transform:scale(.3);}100%{opacity:0; transform:scale(2.4);}}
  .spark{position:absolute; width:6px; height:6px; border-radius:50%; animation:sp .5s ease-out forwards;}
  @keyframes sp{to{opacity:0; transform:translate(var(--dx),var(--dy)) scale(.3);}}
  .float{position:absolute; font-weight:900; animation:floatUp 1s ease-out forwards; text-shadow:0 2px 8px #000; z-index:6;}
  @keyframes floatUp{0%{opacity:0; transform:translateY(8px) scale(.6);}20%{opacity:1; transform:translateY(-4px) scale(1.15);}100%{opacity:0; transform:translateY(-52px) scale(1);}}
  .banner{position:absolute; left:50%; top:26%; transform:translateX(-50%); font-size:30px; font-weight:900; letter-spacing:2px; opacity:0; animation:banner 1.1s ease-out forwards; text-shadow:0 4px 20px rgba(0,0,0,.8); z-index:7; white-space:nowrap;}
  @keyframes banner{0%{opacity:0; transform:translateX(-50%) scale(.5);}25%{opacity:1; transform:translateX(-50%) scale(1.1);}75%{opacity:1;}100%{opacity:0; transform:translateX(-50%) scale(1);}}
  .shake{animation:shake .32s;}
  @keyframes shake{0%,100%{transform:none;}20%{transform:translate(-6px,3px);}40%{transform:translate(6px,-3px);}60%{transform:translate(-4px,-2px);}80%{transform:translate(4px,2px);}}
  #app.frenzy .stage{filter:saturate(1.25) contrast(1.05);}
  #app.frenzy .stage::after{content:""; position:absolute; inset:0; background:radial-gradient(circle at 50% 60%, rgba(255,77,109,.14), transparent 70%); pointer-events:none;}

  /* console (bottom) */
  .console{width:100%; background:#0b1120; border-top:1px solid var(--line); padding:11px 16px 12px; z-index:3;}
  .qrow{display:flex; justify-content:space-between; font-size:11px; color:var(--dim); letter-spacing:1px; margin-bottom:4px;}
  .qtext{font-size:26px; font-weight:900; text-align:center; min-height:32px; margin-bottom:9px; letter-spacing:1px;}
  .opts{display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:560px; margin:0 auto;}
  .opt{padding:11px; font-size:19px; font-weight:800; border-radius:10px; background:linear-gradient(180deg,#1b2742,#141d33); border:1px solid var(--line); transition:transform .06s, background .15s, box-shadow .15s;}
  .opt:hover{background:#23335a; transform:translateY(-1px); box-shadow:0 4px 14px rgba(54,227,255,.15);}
  .opt:disabled{cursor:default;}
  .opt.correct{background:var(--green) !important; color:#04140a; box-shadow:0 0 20px rgba(61,220,132,.5);}
  .opt.wrong{background:var(--red) !important; color:#1a0008;}
  .gauges{display:flex; gap:14px; align-items:center; justify-content:center; margin-top:8px;}
  .gg{font-size:12px; font-weight:800; color:var(--dim);} .gg .n{font-size:19px;}
  .gg.me .n{color:var(--gold);} .gg.foe .n{color:var(--red);}
  .energywrap{width:160px;}
  .energywrap .lbl{font-size:10px; color:var(--dim); display:flex; justify-content:space-between; margin-bottom:2px;}
  .ebar{height:9px; background:#0a0f1d; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
  .ebar > div{height:100%; width:0%; background:linear-gradient(90deg,var(--purple),var(--cyan)); transition:width .25s;}

  /* settlement */
  .stats{display:flex; gap:12px; flex-wrap:wrap; justify-content:center;}
  .stat{background:#0e1526; border:1px solid var(--line); border-radius:12px; padding:12px 18px; text-align:center; min-width:110px;}
  .stat .v{font-size:24px; font-weight:800; color:var(--cyan);} .stat .k{font-size:12px; color:var(--dim); margin-top:4px;}
  .result{font-size:46px; font-weight:900; letter-spacing:5px;}
  .win{color:var(--gold); text-shadow:0 0 24px rgba(255,207,77,.5);} .lose{color:var(--red);}
  .hl{font-size:14px; color:var(--gold); border:1px dashed var(--gold); padding:8px 16px; border-radius:10px; text-align:center;}
  .endbuild{font-size:12px; color:var(--dim); max-width:560px; text-align:center; line-height:1.6;}
</style>
</head>
<body>
<div id="app">

  <!-- START -->
  <div id="start" class="screen">
    <span class="tag">实时 Roguelike 脑力竞技 · 对战原型</span>
    <h1>脑力竞技</h1>
    <div class="heroduel"><span class="h l">🦊</span><span class="vs">VS</span><span class="h r">👾</span></div>
    <p class="sub">
      答对 = 出招打对手,伤害 = <b style="color:var(--cyan)">底数</b> × <b style="color:var(--gold)">倍率</b>。<br>
      抽海克斯强化凑 <b style="color:var(--purple)">×倍率</b> 引擎,连乘指数爆炸。4 小局,3 次抽取,每次可重抽。
    </p>
    <button class="btn" onclick="Game.start()">开始对战</button>
    <button class="tunbtn" onclick="Game.toggleTuner()">⚙ 数值调参</button>
    <div class="tuner" id="tuner">
      <h3>数值调参(改完点"开始对战"生效)</h3>
      <div class="trow"><label>双方血量 HP</label><input id="t_hp" type="number"></div>
      <div class="trow"><label>玩家基础底数(每题)</label><input id="t_baseChips" type="number"></div>
      <div class="trow"><label>连击底数(每连击 +底数)</label><input id="t_comboChips" type="number"></div>
      <div class="trow"><label>大招基础伤害</label><input id="t_ultBase" type="number"></div>
      <div class="trow"><label>对手基础伤害</label><input id="t_foeBase" type="number"></div>
      <div class="trow"><label>对手逐局成长(每小局 +倍)</label><input id="t_foeRamp" type="number" step="0.1"></div>
      <div class="trow"><label>对手准确率(0-1)</label><input id="t_foeAcc" type="number" step="0.02"></div>
    </div>
  </div>

  <!-- AUGMENT PICK -->
  <div id="pick" class="screen hidden">
    <div class="pickhdr">
      <div class="ph" id="pickPhase">强化抽取</div>
      <div class="big" id="pickTitle">选择一个海克斯强化</div>
      <div class="foesum" id="foeSum"></div>
    </div>
    <div class="cards" id="pickCards"></div>
    <div class="rerollrow"><button class="reroll" id="rerollBtn" onclick="Game.reroll()">🎲 重抽 (剩 2)</button></div>
  </div>

  <!-- BATTLE -->
  <div id="battle" class="screen hidden">
    <div class="hudbar"><div class="rn" id="roundN">第 1 小局</div><div class="qc" id="qcount">第 1 题</div></div>
    <div class="stage" id="stage">
      <div class="glow a"></div><div class="glow b"></div>
      <div class="fighter me">
        <div class="fname"><b>你</b><span id="meHpTxt">—</span></div>
        <div class="hpwrap"><div class="hpghost" id="meGhost"></div><div class="hp me" id="meHp"></div></div>
        <div class="marks">&nbsp;</div>
        <div class="avatar me" id="avMe">🦊</div>
        <div class="fbuild" id="buildMe"></div>
      </div>
      <div class="fighter foe">
        <div class="fname"><span id="foeHpTxt">—</span><b>AI 对手</b></div>
        <div class="hpwrap"><div class="hpghost" id="foeGhost"></div><div class="hp foe" id="foeHp"></div></div>
        <div class="marks" id="foeMarkLine">&nbsp;</div>
        <div class="avatar foe" id="avFoe">👾</div>
        <div class="fbuild" id="buildFoe"></div>
      </div>
      <div class="center"><div class="tally" id="tally"></div></div>
      <div id="shots"></div>
    </div>
    <div class="console">
      <div class="qrow"><span id="qmeta">速算 · 中等</span><span id="qprog">本局 1/5 题</span></div>
      <div class="qtext" id="qtext">2 × 6 + 3 = ?</div>
      <div class="opts" id="opts"></div>
      <div class="gauges">
        <span class="gg me">你连击 <span class="n" id="comboMe">0</span></span>
        <div class="energywrap"><div class="lbl"><span>能量</span><span id="eTxt">0/100</span></div><div class="ebar"><div id="ebar"></div></div></div>
        <span class="gg foe">对手连击 <span class="n" id="comboFoe">0</span></span>
      </div>
    </div>
  </div>

  <!-- SETTLEMENT -->
  <div id="end" class="screen hidden">
    <div class="result" id="resultTxt">胜利</div>
    <div class="hl" id="highlight">高光时刻</div>
    <div class="endbuild" id="endBuild"></div>
    <div class="stats" id="endStats"></div>
    <div style="display:flex; gap:14px;">
      <button class="btn" onclick="Game.start()">再来一局</button>
      <button class="btn ghost" onclick="location.reload()">回主菜单</button>
    </div>
  </div>

</div>

<script>
const T={ hp:2200, baseChips:12, comboChips:3, ultBase:200, foeBase:60, foeRamp:0.45, foeAcc:0.72 };
const TKEYS=['hp','baseChips','comboChips','ultBase','foeBase','foeRamp','foeAcc'];

const Audio_=(()=>{let ctx;const ensure=()=>{if(!ctx)ctx=new (window.AudioContext||window.webkitAudioContext)();return ctx;};
  function blip(f,d=.08,t='triangle',v=.18){try{const c=ensure(),o=c.createOscillator(),g=c.createGain();
    o.type=t;o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
  return{correct:()=>blip(660,.07),crit:()=>{blip(880,.09,'square',.2);setTimeout(()=>blip(1320,.12,'square',.18),60);},
    wrong:()=>blip(150,.18,'sawtooth',.18),pick:()=>{blip(520,.08);setTimeout(()=>blip(780,.1),70);},
    reroll:()=>{blip(420,.05,'square',.12);setTimeout(()=>blip(620,.06,'square',.12),55);},

const TIER_NAME={silver:'银',gold:'金',prismatic:'棱彩'};
const QPR=5, MAX_ROUND=4;

/* ===== scene / fx ===== */
const Scene={
  rect(id){ return document.getElementById(id).getBoundingClientRect(); },
  stageRect(){ return document.getElementById('stage').getBoundingClientRect(); },
  attack(side, amount, crit, kind){ // side = attacker ('me' or 'foe')
    const av=document.getElementById(side==='me'?'avMe':'avFoe');
    const tgt=document.getElementById(side==='me'?'avFoe':'avMe');
    av.classList.remove('lungeL','lungeR'); void av.offsetWidth;
    av.classList.add(side==='me'?'lungeL':'lungeR');
    const s=this.stageRect(), a=this.rect(side==='me'?'avMe':'avFoe'), t=this.rect(side==='me'?'avFoe':'avMe');
    const x0=a.left-s.left+a.width/2, y0=a.top-s.top+a.height*0.4;
    const x1=t.left-s.left+t.width/2, y1=t.top-s.top+t.height*0.4;
    const color = kind==='detonate'?'#b15dff':crit?'#ffcf4d':side==='foe'?'#ff6a4d':'#36e3ff';
    const big = crit?1.7:1; const sz=Math.min(2.4, 0.8+amount/700)*big;
    const shot=document.createElement('div'); shot.className='shot';
    shot.style.color=color; shot.style.background=color;
    shot.style.left=x0+'px'; shot.style.top=y0+'px';
    shot.style.transform=`translate(-50%,-50%) scale(${sz})`;
    shot.style.transition='transform .26s cubic-bezier(.5,0,.9,.4), left .26s cubic-bezier(.5,0,.9,.4), top .26s';
    document.getElementById('shots').appendChild(shot);
    requestAnimationFrame(()=>{ shot.style.left=x1+'px'; shot.style.top=y1+'px'; shot.style.transform=`translate(-50%,-50%) scale(${sz*1.1})`; });
    setTimeout(()=>{ shot.remove(); this.impact(x1,y1,color,sz); this.hurt(tgt);
      this.dmgNum(x1,y1,amount,crit,side); Audio_.hit(); if(crit||amount>500)Game.shake(); }, 270);
  },
  impact(x,y,color,sz){
    const lay=document.getElementById('shots');
    const im=document.createElement('div'); im.className='impact';
    const d=40*sz; im.style.width=d+'px'; im.style.height=d+'px'; im.style.left=(x-d/2)+'px'; im.style.top=(y-d/2)+'px';
    im.style.background=`radial-gradient(circle, ${color} 0%, transparent 70%)`;
    lay.appendChild(im); setTimeout(()=>im.remove(),420);
    for(let i=0;i<7;i++){ const sp=document.createElement('div'); sp.className='spark'; sp.style.background=color;
      sp.style.left=x+'px'; sp.style.top=y+'px'; const ang=Math.random()*6.28, dist=20+Math.random()*40;
      sp.style.setProperty('--dx',Math.cos(ang)*dist+'px'); sp.style.setProperty('--dy',Math.sin(ang)*dist+'px');
      lay.appendChild(sp); setTimeout(()=>sp.remove(),500); }
  },
  hurt(av){ av.classList.remove('hurt'); void av.offsetWidth; av.classList.add('hurt'); setTimeout(()=>av.classList.remove('hurt'),400); },
  dmgNum(x,y,n,crit,side){
    const lay=document.getElementById('shots'); const e=document.createElement('div'); e.className='float';
    e.textContent='-'+n; e.style.left=x+'px'; e.style.top=(y-20)+'px';
    e.style.fontSize=(crit?34:22)+'px'; e.style.color=crit?'#ffcf4d':side==='me'?'#36e3ff':'#ff4d6d';
    lay.appendChild(e); setTimeout(()=>e.remove(),1000);
  },
  heal(side,n){ const av=this.rect(side==='me'?'avMe':'avFoe'), s=this.stageRect();
    const lay=document.getElementById('shots'); const e=document.createElement('div'); e.className='float';
    e.textContent='+'+n; e.style.left=(av.left-s.left+av.width/2)+'px'; e.style.top=(av.top-s.top)+'px';
    e.style.fontSize='20px'; e.style.color='#3ddc84'; lay.appendChild(e); setTimeout(()=>e.remove(),1000); },
  banner(txt,color){ const lay=document.getElementById('shots'); const e=document.createElement('div'); e.className='banner';
    e.textContent=txt; e.style.color=color||'#ffcf4d'; lay.appendChild(e); setTimeout(()=>e.remove(),1100); },
};

/* ===== game ===== */
const Game={
  toggleTuner(){ const t=document.getElementById('tuner'); t.classList.toggle('open'); if(t.classList.contains('open')) TKEYS.forEach(k=>{document.getElementById('t_'+k).value=T[k];}); },
  readTuner(){ TKEYS.forEach(k=>{ const el=document.getElementById('t_'+k); if(el&&el.value!=='') T[k]=parseFloat(el.value); }); },
  shake(){ const a=document.getElementById('app'); a.classList.remove('shake'); void a.offsetWidth; a.classList.add('shake'); },

  start(){
    this.readTuner();
    this.mods=newMods(); this.foeMods={dmgMul:1,critChance:0.07,buffs:[]};
    this.owned=[]; this.me=T.hp; this.foe=T.hp; this.shield=0; this.foeMarks=0;
    this.energy=0; this.combo=0; this.foeCombo=0; this.maxCombo=0; this.guaranteedCrit=false;
    this.round=0; this.qInRound=0; this.qTotal=0; this.pickCount=0; this.rerolls=2;
    this.stat={dmg:0,correct:0,wrong:0,biggestHit:0,ult:0,detonated:0,peakMult:1};
    document.getElementById('app').classList.remove('frenzy');
    this.toPick(true);
  },

  toPick(isStart){
    show('pick'); this.pickCount++;
    this.curTier=this.pickCount===1?'silver':this.pickCount===2?'gold':'prismatic';
    if(this.curTier==='prismatic') Audio_.pris();
    document.getElementById('pickPhase').textContent=(isStart?'第 1 次抽取':`第 ${this.pickCount} 次抽取(已打完 ${this.round} 小局)`)+' · '+TIER_NAME[this.curTier]+'强化';
    document.getElementById('pickTitle').textContent=this.curTier==='prismatic'?'✦ 棱彩核心 · ×倍率引擎':this.curTier==='gold'?'金色收益 · 放大倍率':'银色催化剂 · 选定方向';
    this.curOffer=this.rollOffer(this.curTier);
    this.renderFoeSum(); this.renderOffer(); this.updateReroll();
  },
  rollOffer(tier){
    let pool=AUGMENTS.filter(a=>a.tier===tier && !this.owned.find(o=>o.id===a.id));
    if(pool.length<3) pool=AUGMENTS.filter(a=>!this.owned.find(o=>o.id===a.id));
    const own=new Set(); this.owned.forEach(o=>o.tags.forEach(t=>own.add(t)));
    const bag=[]; pool.forEach(a=>{ const w=1+a.tags.filter(t=>own.has(t)).length*3; for(let i=0;i<w;i++) bag.push(a); });
    const pick=[],used=new Set(); let g=0;
    while(pick.length<3 && used.size<pool.length && g++<300){ const a=bag[Math.floor(Math.random()*bag.length)]; if(!used.has(a.id)){used.add(a.id);pick.push(a);} }
    return pick;
  },
  renderOffer(){
    const wrap=document.getElementById('pickCards'); wrap.innerHTML='';
    this.curOffer.forEach(a=>{
      const syn=this.synergyHint(a);
      const el=document.createElement('div'); el.className=`card tier-${a.tier}`;
      el.innerHTML=`<span class="tierbadge">${TIER_NAME[a.tier]}</span><div class="ico">${a.ico}</div>
        <div class="row1"><span class="chiptag ${a.kind==='x'?'xmult':a.kind==='add'?'addmult':a.kind==='chips'?'chips':'util'}">${KIND_NAME[a.kind]}</span></div>
        <div class="name">${a.name}</div><div class="desc">${a.desc}</div><div class="syn">${syn||''}</div>`;
      el.onclick=()=>this.take(a); wrap.appendChild(el);
    });
  },
  updateReroll(){ const b=document.getElementById('rerollBtn'); b.textContent=`🎲 重抽 (剩 ${this.rerolls})`; b.disabled=this.rerolls<=0; },
  reroll(){ if(this.rerolls<=0) return; this.rerolls--; Audio_.reroll(); this.curOffer=this.rollOffer(this.curTier); this.renderOffer(); this.updateReroll(); },
  synergyHint(a){
    const own=new Set(); this.owned.forEach(o=>o.tags.forEach(t=>own.add(t)));
    const sh=a.tags.filter(t=>own.has(t)); if(!sh.length) return '';
    const map={mark:'过载',crit:'暴击',combo:'连击',shield:'护盾',energy:'能量',ctl:'干扰',chips:'底数',scale:'难题'};
    return '↗ 联动你的「'+sh.map(s=>map[s]).join('/')+'」流派';
  },
  take(a){ a.tier==='prismatic'?Audio_.pris():Audio_.pick(); this.owned.push(a); a.apply(this.mods); this.foeBuff(); this.beginRound(); },
  foeBuff(){ if(this.round===0) return;
    const opts=[ ()=>{this.foeMods.dmgMul+=0.22;return{ico:'🗡️',name:'强攻'};}, ()=>{this.foeMods.critChance+=0.13;return{ico:'💥',name:'暴击'};},
      ()=>{this.foeMods.dmgMul+=0.16;return{ico:'⚔️',name:'凶猛'};}, ()=>{this.foeMods.dmgMul+=0.18;return{ico:'🎯',name:'精进'};} ];
    this.foeMods.buffs.push(opts[Math.floor(Math.random()*opts.length)]()); },

  beginRound(){
    this.round++; const frenzy=this.round>=MAX_ROUND;
    document.getElementById('app').classList.toggle('frenzy',frenzy);
    show('battle');
    document.getElementById('roundN').textContent=frenzy?'🔥 狂暴小局':`第 ${this.round} 小局`;
    this.qInRound=0; this.forgiveLeft=this.mods.forgive||0;
    this.renderBuild();
    if(frenzy){ Audio_.frenzy(); Scene.banner('🔥 狂暴小局 · 倍率再 ×2','#ff4d6d'); }
    this.refresh(); this.nextQuestion();
  },
  fm(){ return this.round>=MAX_ROUND?2:1; },
  foeStageMul(){ return 1+T.foeRamp*(this.round-1); },

  nextQuestion(){
    const tl=document.getElementById('tally'); tl.classList.remove('show'); tl.innerHTML='';
    const hard=Math.random()<(0.14+this.round*0.13);
    let a,b,c,ans,text;
    if(hard){ a=rand(2,9);b=rand(2,9);c=rand(1,9); ans=a*b+c; text=`${a} × ${b} + ${c} = ?`; }
    else{ const r=Math.random();
      if(r<0.5){a=rand(2,12);b=rand(2,12);ans=a*b;text=`${a} × ${b} = ?`;}
      else if(r<0.8){a=rand(20,99);b=rand(10,60);ans=a+b;text=`${a} + ${b} = ?`;}
      else{a=rand(40,99);b=rand(10,39);ans=a-b;text=`${a} − ${b} = ?`;} }
    this.cur={ans,hard};
    document.getElementById('qmeta').textContent='速算 · '+(hard?'困难 ✦':'中等');
    document.getElementById('qprog').textContent=`本局 ${this.qInRound+1}/${QPR} 题`;
    document.getElementById('qcount').textContent=`第 ${this.qTotal+1} 题`;
    document.getElementById('qtext').textContent=text;
    const set=new Set([ans]); while(set.size<4){let d=ans+rand(-9,9)*(Math.random()<.5?1:rand(1,4)); if(d!==ans&&d>=0)set.add(d);}
    const arr=shuffle([...set]); const box=document.getElementById('opts'); box.innerHTML='';
    arr.forEach(v=>{const b2=document.createElement('button');b2.className='opt';b2.textContent=v;
      b2.onclick=()=>this.answer(v===ans,b2);box.appendChild(b2);});
  },

  answer(correct,el){
    [...document.getElementById('opts').children].forEach(o=>o.disabled=true);
    if(correct){
      el.classList.add('correct'); this.stat.correct++;
      this.combo++; this.maxCombo=Math.max(this.maxCombo,this.combo);
      if(this.mods.markPerHit) this.addMarks(this.mods.markPerHit);
      const r=this.computeDamage(); this.showTally(r); this.dealToFoe(r);
      if(this.mods.shieldPer && this.combo%3===0){ this.shield+=this.mods.shieldPer; this.fireAug('shieldgen'); }
      this.energy+=(14+(this.mods.regen||0)); if(this.energy>=100) this.ult();
    } else {
      el.classList.add('wrong'); Audio_.wrong(); this.stat.wrong++;
      const tl=document.getElementById('tally'); tl.classList.add('show');
      if(this.forgiveLeft>0){ this.forgiveLeft--; this.fireAug('forgive'); tl.innerHTML='<span class="x" style="color:var(--cyan)">容错矩阵 · 连击保留</span>'; }
      else if(this.mods.comboNeverResets){ this.fireAug('singularity'); tl.innerHTML='<span class="x" style="color:var(--purple)">奇点 · 连击不灭</span>'; }
      else { this.combo=0; tl.innerHTML='<span class="x" style="color:var(--dim)">答错 · 连击清零</span>'; }
    }
    const foeAcc=Math.max(0.16, T.foeAcc-(this.mods.foeAccDrop||0));
    if(Math.random()<foeAcc){
      this.foeCombo++;
      let d=T.foeBase*this.foeMods.dmgMul*this.foeStageMul();
      if(this.foeCombo>=5)d*=1.7; else if(this.foeCombo>=3)d*=1.4;
      let crit=false; if(Math.random()<this.foeMods.critChance){d*=1.6;crit=true;}
      d=Math.round(d);
      if(this.shield>0){const ab=Math.min(this.shield,d);this.shield-=ab;d-=ab;}
      if(d>0){ this.me=Math.max(0,this.me-d); setTimeout(()=>Scene.attack('foe',d,crit),140); }
    } else {
      this.foeCombo=0;
      if(this.mods.siphon){ this.energy=Math.min(100,this.energy+this.mods.siphon); this.fireAug('siphon'); }
      if(this.mods.foeMissHeal){ this.heal(this.mods.foeMissHeal); Scene.heal('me',this.mods.foeMissHeal); this.fireAug('siphon'); this.fireAug('totalpollution'); }
      if(this.mods.foeMissMark){ this.addMarks(this.mods.foeMissMark); }
    }
    this.refresh();
    setTimeout(()=>{
      this.qInRound++; this.qTotal++;
      if(this.me<=0||this.foe<=0){ this.finish(); return; }
      if(this.qInRound<QPR) this.nextQuestion();
      else if(this.round>=MAX_ROUND) this.finish();
      else if(this.pickCount>=3) this.beginRound();
      else this.toPick(false);
    }, 1150);
  },

  addMarks(n){ this.foeMarks+=n; if(!this.mods.markUncapped) this.foeMarks=Math.min(40,this.foeMarks); this.fireAug('mark'); this.fireAug('meltdown'); },

  computeDamage(){
    const m=this.mods, fm=this.fm(), fired=[];
    let chips=T.baseChips + T.comboChips*this.combo + (m.chipFlat||0) + (m.comboChipsBonus||0)*this.combo;
    if(m.shieldToChips && this.shield>0){ chips+=Math.round(this.shield*m.shieldToChips); }
    let add=0, x=1; const cm=m.comboMultDouble?2:1;
    if(m.momentumMult){ add+=m.momentumMult*this.combo*cm; }
    if(m.markAddMult && this.foeMarks>0){ add+=m.markAddMult*this.foeMarks; fired.push('resent'); }
    let crit=false;
    if(this.guaranteedCrit){ crit=true; this.guaranteedCrit=false; }
    else if(Math.random()<Math.min(0.95,(m.critChance||0))) crit=true;
    if(crit){ x*=1.5*(m.critXmult||1); fired.push('crit','critamp','overload'); }
    if(m.comboXmult>1 && this.combo>=5){ x*=m.comboXmult; fired.push('overclock'); }
    if(m.truthXmult>1 && this.cur.hard){ x*=m.truthXmult; fired.push('truth'); }
    if(m.markXmultPer>1 && this.foeMarks>=10){ x*=Math.pow(m.markXmultPer,Math.floor(this.foeMarks/10)); fired.push('meltdown'); }
    if(fm>1) x*=2;
    const mult=(1+add)*x; this.stat.peakMult=Math.max(this.stat.peakMult,mult);
    return {amount:Math.max(1,Math.round(chips*mult)), crit, chips:Math.round(chips), mult, fired};
  },
  showTally(r){
    const t=document.getElementById('tally');
    t.innerHTML=`<span class="chips">底数 ${r.chips}</span><span class="x">×</span><span class="mult">倍率 ${r.mult.toFixed(1)}</span><span class="eq">=</span><span class="dmg${r.crit?' crit':''}">${r.amount}${r.crit?' 💥':''}</span>`;
    t.classList.remove('show'); void t.offsetWidth; t.classList.add('show');
    r.crit?Audio_.crit():Audio_.correct();
  },
  dealToFoe(r){
    this.foe=Math.max(0,this.foe-r.amount);
    this.stat.dmg+=r.amount; this.stat.biggestHit=Math.max(this.stat.biggestHit,r.amount);
    Scene.attack('me', r.amount, r.crit);
    r.fired.forEach(id=>this.fireAug(id));
    if(r.crit){
      if(this.mods.critToCombo){ this.combo+=this.mods.critToCombo; this.fireAug('echo'); }
      if(this.mods.critGuarantee){ this.guaranteedCrit=true; this.fireAug('overload'); }
      if(this.mods.markDetonate && this.foeMarks>0){
        const boom=Math.round(this.foeMarks*this.mods.markDetonate*this.fm());
        this.foe=Math.max(0,this.foe-boom); this.stat.dmg+=boom; this.stat.detonated++;
        setTimeout(()=>{ Scene.attack('me',boom,true,'detonate'); Scene.banner('💣 引爆 '+this.foeMarks+' 层!','#b15dff'); Audio_.boom(); },180);
        this.fireAug('detonate'); this.foeMarks=0;
      }
    }
    if(this.mods.lifesteal) this.heal(Math.round(r.amount*this.mods.lifesteal));
    if(this.combo===5||this.combo===10||this.combo===15||this.combo===20) Scene.banner(this.combo+' 连击!','#ffcf4d');
  },
  heal(n){ const room=T.hp-this.me; if(n<=room) this.me+=n; else{ this.me=T.hp; if(this.mods.overhealToShield){ this.shield+=(n-room); } } },
  ult(){ this.energy=0; this.stat.ult++; let d=T.ultBase*this.fm()*2;
    if(this.mods.ultScales){ const r=this.computeDamage(); d=Math.round(d+r.amount*1.5); }
    this.foe=Math.max(0,this.foe-d); this.stat.dmg+=d;
    Scene.banner('⚡ 技能爆发!','#36e3ff'); setTimeout(()=>Scene.attack('me',d,true),100); this.fireAug('ultengine'); },

  fireAug(id){ const el=document.querySelector('#buildMe .b[data-id="'+id+'"]'); if(el){ el.classList.add('fire'); setTimeout(()=>el.classList.remove('fire'),300); } },

  renderBuild(){
    const me=document.getElementById('buildMe'), foe=document.getElementById('buildFoe');
    me.innerHTML=this.owned.map(a=>`<span class="b" data-id="${a.id}" title="${a.name}">${a.ico}</span>`).join('');
    foe.innerHTML=(this.foeMods.buffs||[]).map(b=>`<span class="b" title="${b.name}">${b.ico}</span>`).join('');
  },
  renderFoeSum(){
    const el=document.getElementById('foeSum'); if(!el) return;
    const b=this.foeMods.buffs||[]; let core='<span>对手 Build:</span>';
    if(!b.length) core+='<span class="fc">基础</span>';
    else{ const cnt={}; b.forEach(x=>cnt[x.name]=(cnt[x.name]||0)+1); const seen={}; b.forEach(x=>{if(seen[x.name])return;seen[x.name]=1;core+=`<span class="fc">${x.ico} ${x.name}${cnt[x.name]>1?' ×'+cnt[x.name]:''}</span>`;}); }
    core+='　<span>准确率 '+Math.round(Math.max(0.16,T.foeAcc-(this.mods.foeAccDrop||0))*100)+'%</span>';
    el.innerHTML=core;
  },
  refresh(){
    document.getElementById('meHp').style.width=(this.me/T.hp*100)+'%';
    document.getElementById('foeHp').style.width=(this.foe/T.hp*100)+'%';
    document.getElementById('meGhost').style.width=(this.me/T.hp*100)+'%';
    document.getElementById('foeGhost').style.width=(this.foe/T.hp*100)+'%';
    document.getElementById('meHpTxt').textContent=Math.round(this.me)+(this.shield>0?' 🛡'+Math.round(this.shield):'');
    document.getElementById('foeHpTxt').textContent=Math.round(this.foe);
    document.getElementById('foeMarkLine').innerHTML=this.foeMarks>0?('☠️ 过载 ×'+this.foeMarks):'&nbsp;';
    document.getElementById('comboMe').textContent=this.combo||0;
    document.getElementById('comboFoe').textContent=this.foeCombo||0;
    const e=Math.min(100,Math.round(this.energy));
    document.getElementById('ebar').style.width=e+'%'; document.getElementById('eTxt').textContent=e+'/100';
  },

  finish(){ this.showEnd(); },
  showEnd(){
    const win=(this.foe<=0 || this.me>this.foe) && this.me>0;
    show('end');
    const r=document.getElementById('resultTxt');
    r.textContent=this.me<=0?'失败':win?'胜利':'惜败'; r.className='result '+(win?'win':'lose'); win?Audio_.win():Audio_.lose();
    let hl='稳扎稳打,小胜一筹。'; const pris=this.owned.filter(a=>a.tier==='prismatic');
    if(this.stat.peakMult>=10) hl=`🌌 倍率峰值 ×${this.stat.peakMult.toFixed(0)} — 引擎起飞了!`;
    else if(this.stat.biggestHit>=1500) hl=`💥 单次最高 ${this.stat.biggestHit} — Build 成神!`;
    else if(this.stat.detonated>=2) hl=`💣 引爆 ${this.stat.detonated} 次过载 — 滚雪球炸穿!`;
    else if(pris.length) hl=`🌌 围绕「${pris[0].name}」成型 — 流派打通!`;
    else if(this.foe<=0) hl='🎯 把对面血条清空 — 完胜!';
    document.getElementById('highlight').textContent=hl;
    document.getElementById('endBuild').textContent='本局 Build:'+(this.owned.length?this.owned.map(a=>a.ico+a.name).join(' → '):'(无)');
    const acc=this.stat.correct+this.stat.wrong?Math.round(this.stat.correct/(this.stat.correct+this.stat.wrong)*100):0;
    document.getElementById('endStats').innerHTML=[
      ['总伤害',this.stat.dmg],['倍率峰值','×'+this.stat.peakMult.toFixed(1)],['最高连击',this.maxCombo],
      ['单次最高',this.stat.biggestHit],['正确率',acc+'%'],['引爆',this.stat.detonated+' 次'],
    ].map(([k,v])=>`<div class="stat"><div class="v">${v}</div><div class="k">${k}</div></div>`).join('');
  },
};

function newMods(){return{chipFlat:0,comboChipsBonus:0,shieldToChips:0,momentumMult:0,markAddMult:0,comboMultDouble:false,
  critChance:0.05,critXmult:1,comboXmult:1,truthXmult:1,markXmultPer:1,markPerHit:0,markDetonate:0,markUncapped:false,
  critToCombo:0,critGuarantee:false,shieldPer:0,forgive:0,regen:0,lifesteal:0,overhealToShield:false,ultScales:false,
  foeAccDrop:0,siphon:0,foeMissHeal:0,foeMissMark:0,comboNeverResets:false};}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){['start','pick','battle','end'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));}
</script>
