name: Deploy single-engine prototype to Pages

# Pages 站点为 legacy 模式(gh-pages 分支托管),此 workflow 负责把
# prototypes/single-engine 同步到 gh-pages。弃用 actions/deploy-pages
# (2026-07-02 连续两次 "Deployment failed, try again later")。

on:
  push:
    branches: [main]
    paths:
      - "prototypes/single-engine/**"
      - ".github/workflows/deploy-single-engine.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push prototype to gh-pages branch
        run: |
          cd prototypes/single-engine
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" gh-pages
